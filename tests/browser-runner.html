<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<title>Beans Browser Smoke Runner</title>
</head>
<body data-status="running">
<pre id="result">running</pre>
<script>
(async () => {
  const result = document.getElementById('result');
  const errors = [];
  const checks = [];

  function record(name) {
    checks.push(name);
  }

  function assert(condition, message) {
    if (!condition) throw new Error(message);
  }

  function wait(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
  }

  async function waitFor(predicate, message) {
    const start = performance.now();
    while (performance.now() - start < 8000) {
      if (predicate()) return;
      await wait(25);
    }
    throw new Error(message);
  }

  async function loadGame(pathname, query = 'test=1', viewport = {}) {
    const iframe = document.createElement('iframe');
    iframe.width = viewport.width || 1280;
    iframe.height = viewport.height || 720;
    iframe.src = `${pathname}?${query}`;
    document.body.appendChild(iframe);
    await new Promise((resolve, reject) => {
      iframe.onload = resolve;
      iframe.onerror = () => reject(new Error(`Failed to load ${pathname}`));
    });

    const win = iframe.contentWindow;
    const originalError = win.console.error.bind(win.console);
    win.console.error = (...args) => {
      errors.push(args.map(arg => String(arg)).join(' '));
      originalError(...args);
    };
    win.addEventListener('error', event => errors.push(event.message || 'window error'));
    win.addEventListener('unhandledrejection', event => {
      errors.push(event.reason?.stack || event.reason?.message || String(event.reason));
    });

    await waitFor(
      () => win.miguelitoSim?.state?.level?.platforms?.length > 0,
      `Current procedural game did not become ready for ${pathname}`,
    );
    await waitFor(
      () => typeof win.miguelitoTutorialDiagnostics === 'function',
      `Tutorial runtime did not become ready for ${pathname}`,
    );
    return { iframe, win };
  }

  function verifyCurrentGame(win, label) {
    const sim = win.miguelitoSim;
    const expectedChunks = sim.state.level.phaseProfile?.totalChunks;
    assert(!!win.document.querySelector('canvas'), `${label}: canvas should exist`);
    assert(sim.state.campaign?.phase === 1, `${label}: campaign should start at phase 1`);
    assert(Number.isInteger(expectedChunks), `${label}: generated level should expose its phase profile`);
    assert(sim.state.level.debugInfo?.length === expectedChunks, `${label}: generated chunks should match the phase profile`);
    assert(sim.state.level.platforms.length > sim.state.level.debugInfo.length, `${label}: generated route should include start and recovery platforms`);
    assert(typeof win.miguelitoTutorialVersion === 'string', `${label}: tutorial entrypoint should expose its version`);
    assert(!!win.document.querySelector('[data-tutorial-styles]'), `${label}: tutorial styles should be available`);
    assert(
      !win.document.documentElement.classList.contains('touch-device'),
      `${label}: desktop viewport should not expose touch controls`,
    );
  }

  async function verifyTutorialFlow(win, label) {
    const manager = win.miguelitoTutorial;
    await waitFor(
      () => manager && !manager.isOpen,
      `${label}: tutorial manager should become ready without blocking the test entrypoint`,
    );

    // O cartão de boas-vindas também usa a fila automática. Ele não faz parte
    // deste cenário e é marcado como conhecido antes de posicionarmos o jogador.
    manager.markSeen('system-welcome');
    await waitFor(
      () => !manager.pendingCards.some(entry => entry.cardId === 'system-welcome'),
      `${label}: seen welcome card should leave the automatic queue`,
    );

    const sim = win.miguelitoSim;
    const player = sim.state.player;
    player.onGround = false;
    player.y = 180;
    player.vy = 180;

    const encounter = manager.trigger('organism-bacillus', {
      tutorialMode: 'silent',
      source: 'first-proximity-encounter',
      phase: 1,
      chunkIndex: 6,
      worldX: 1000,
      visibleWorldWidth: 900,
      nowSeconds: 10,
    });
    assert(encounter, `${label}: first Bacillus proximity should process its mandatory trigger`);
    assert(!manager.isOpen, `${label}: airborne mandatory card must not open immediately`);
    assert(
      manager.pendingCards.some(entry => entry.cardId === 'organism-bacillus'),
      `${label}: airborne mandatory card should remain queued`,
    );

    const support = sim.state.level.platforms.find(platform => (
      !platform.recovery && !platform.final && platform.w >= 100
    ));
    player.x = support.x + Math.min(40, support.w / 3);
    player.y = support.y - player.h;
    player.vx = 120;
    player.vy = 0;
    player.onGround = true;
    try {
      await waitFor(
        () => manager.currentCardId === 'organism-bacillus',
        `${label}: queued Bacillus card should open after stable support`,
      );
    } catch (error) {
      throw new Error(`${error.message}; diagnostics=${JSON.stringify({
        pending: manager.pendingCards,
        safety: manager.safetyDiagnostics,
        gameState: sim.state.gameState,
        player: {
          x: player.x, y: player.y, vx: player.vx, vy: player.vy,
          onGround: player.onGround, alive: player.alive,
        },
        support,
      })}`);
    }
    assert(player.vx === 0 && player.vy === 0, `${label}: automatic opening should stabilize the player`);
    const pausedTime = sim.state.time;
    const pausedPosition = { x: player.x, y: player.y };
    await wait(120);
    assert(sim.state.time === pausedTime, `${label}: game time should freeze while tutorial is open`);
    assert(player.x === pausedPosition.x && player.y === pausedPosition.y, `${label}: player should not move while paused`);

    const nextButton = win.document.querySelector('.tutorial-next');
    const nextRect = nextButton.getBoundingClientRect();
    const nextHit = win.document.elementFromPoint(
      nextRect.left + nextRect.width / 2,
      nextRect.top + nextRect.height / 2,
    );
    assert(
      nextHit === nextButton || nextButton.contains(nextHit),
      `${label}: tutorial navigation should not be covered by HUD controls`,
    );

    assert(
      JSON.stringify(manager.getUnlockedPages('organism-bacillus')) === '[0]',
      `${label}: first Bacillus encounter should unlock only page zero`,
    );

    const second = manager.trigger('organism-rhizobium', {
      tutorialMode: 'silent',
      source: 'first-proximity-encounter',
      phase: 2,
      chunkIndex: 4,
      worldX: 1100,
      visibleWorldWidth: 900,
      nowSeconds: 11,
    });
    assert(second, `${label}: a different mandatory card should join the queue`);
    win.dispatchEvent(new win.KeyboardEvent('keydown', {
      code: 'Space', key: ' ', bubbles: true, cancelable: true,
    }));
    nextButton.click();
    assert(!manager.isOpen, `${label}: closing one card must resume before opening the next`);
    // O Chrome headless pode suspender RAFs do segundo iframe quando o orçamento
    // virtual está perto do fim. Executamos aqui os mesmos checks pós-física que
    // o app chama no fim de cada frame: 1 frame de retomada + 3 de estabilidade.
    for (let frame = 0; frame < 4; frame++) manager.updateAutomaticPresentation(.05);
    try {
      await waitFor(
        () => manager.currentCardId === 'organism-rhizobium',
        `${label}: held jump must not fire; second card opens after a fresh grounded check`,
      );
    } catch (error) {
      throw new Error(`${error.message}; diagnostics=${JSON.stringify({
        pending: manager.pendingCards,
        safety: manager.safetyDiagnostics,
        gameState: sim.state.gameState,
        player: {
          x: player.x, y: player.y, vx: player.vx, vy: player.vy,
          onGround: player.onGround, alive: player.alive,
        },
        debug: win.document.getElementById('debug')?.textContent,
      })}`);
    }
    assert(player.onGround && player.vy === 0, `${label}: held jump should remain blocked until keyup`);
    win.dispatchEvent(new win.KeyboardEvent('keyup', {
      code: 'Space', key: ' ', bubbles: true, cancelable: true,
    }));
    win.document.querySelector('.tutorial-next').click();
    await waitFor(() => !manager.isOpen, `${label}: one-page Bacillus introduction should close`);

    const pendingBeforeRepeat = manager.pendingCount;
    manager.trigger('organism-bacillus', {
      tutorialMode: 'silent',
      source: 'first-proximity-encounter',
      phase: 1,
      chunkIndex: 6,
      worldX: 1000,
      visibleWorldWidth: 900,
      nowSeconds: 12,
    });
    assert(manager.pendingCount === pendingBeforeRepeat, `${label}: seen card should not re-enter the queue`);

    manager.trigger('structure-biofilm', {
      tutorialMode: 'silent',
      phase: 1,
      chunkIndex: 12,
      worldX: 1500,
      visibleWorldWidth: 900,
      nowSeconds: 20,
    });
    assert(!manager.isOpen, `${label}: derived biofilm update should not open a panel in silent mode`);
    assert(
      JSON.stringify(manager.getUnlockedPages('organism-bacillus')) === '[0,1,2,3]',
      `${label}: biofilm should update the Bacillus guide progressively`,
    );

    win.dispatchEvent(new win.KeyboardEvent('keydown', {
      code: 'F5', ctrlKey: true, bubbles: true,
    }));
  }

  try {
    const dev = await loadGame('/index.html');
    verifyCurrentGame(dev.win, 'source');
    await verifyTutorialFlow(dev.win, 'source');
    record('source-entrypoints');
    dev.iframe.remove();

    const built = await loadGame('/dist/index.html');
    verifyCurrentGame(built.win, 'build');
    await verifyTutorialFlow(built.win, 'build');
    assert(
      built.win.document.querySelectorAll('script[type="module"]').length === 0,
      'build: module entrypoints should be replaced by the inline bundle',
    );
    assert(
      built.win.document.querySelectorAll('style[data-tutorial-styles]').length === 1,
      'build: tutorial styles should be embedded in the standalone document',
    );
    assert(
      built.win.document.querySelectorAll('link[data-tutorial-styles]').length === 0,
      'build: standalone document should not request an external tutorial stylesheet',
    );
    record('standalone-bundle');

    const lab = await loadGame('/index.html', 'test=1&phaseLab=1');
    await waitFor(() => lab.win.miguelitoPhaseLab?.enabled, 'Phase Lab API should become ready');
    assert(!!lab.win.document.querySelector('.phase-lab'), 'Phase Lab panel should be mounted');
    assert(!lab.win.document.querySelector('[data-platform-drag-editor]'), 'Phase Lab should not include a platform drag editor');
    const labToggle = lab.win.document.querySelector('.phase-lab-toggle');
    const touchControls = lab.win.document.querySelector('#touch-controls');
    lab.win.document.documentElement.classList.add('touch-device');
    touchControls.hidden = false;
    const labToggleRect = labToggle.getBoundingClientRect();
    const touchActionsRect = lab.win.document.querySelector('.touch-cluster.actions').getBoundingClientRect();
    const overlapsTouchActions = !(
      labToggleRect.right <= touchActionsRect.left
      || labToggleRect.left >= touchActionsRect.right
      || labToggleRect.bottom <= touchActionsRect.top
      || labToggleRect.top >= touchActionsRect.bottom
    );
    assert(!overlapsTouchActions, 'Phase Lab toggle should not overlap mobile action controls');
    assert(labToggleRect.top < 180, 'Phase Lab toggle should remain in the upper HUD area');
    const config = lab.win.miguelitoPhaseLab.getConfig();
    config.seed = 'browser-phase-lab';
    config.allowedOrganisms = ['bacillus'];
    config.allowedPathogens = [];
    config.resources = { exudates: 4, crystals: 1, checkpoints: 2 };
    lab.win.miguelitoPhaseLab.applyConfig(config);
    await waitFor(
      () => lab.win.miguelitoSim.state.level.exudates?.length === 4
        && lab.win.miguelitoSim.state.level.crystals?.length === 1
        && lab.win.miguelitoSim.state.level.checkpoints?.length === 2,
      'Phase Lab should restart with configured resources',
    );
    const exported = JSON.parse(lab.win.miguelitoPhaseLab.exportManifest());
    assert(exported.phaseLab.seed === 'browser-phase-lab', 'Phase Lab export should preserve the seed');
    assert(JSON.stringify(exported.phaseLab.allowedOrganisms) === '["bacillus"]', 'Phase Lab export should preserve organism pool');
    record('phase-lab-runtime');
    lab.iframe.remove();

    await wait(100);
    assert(errors.length === 0, `console/page errors: ${errors.join('; ')}`);
    built.iframe.remove();

    // O Chromium headless deixa de entregar RAFs de forma confiavel depois de
    // varios jogos no mesmo runner. Esta verificacao nao depende do loop e fica
    // por ultimo para nao interferir nos fluxos integrados anteriores.
    const mobile = await loadGame(
      '/index.html',
      'test=1',
      { width: 844, height: 390 },
    );
    await waitFor(
      () => mobile.win.document.querySelector('canvas')?.width === 1558,
      'responsive canvas did not adapt to the mobile landscape viewport',
    );
    const mobileCanvas = mobile.win.document.querySelector('canvas');
    assert(mobileCanvas.height === 720, 'mobile canvas must preserve logical height');
    assert(
      Math.abs(mobileCanvas.width / mobileCanvas.height - 844 / 390) < .001,
      'mobile canvas must match the viewport aspect ratio without letterbox bars',
    );
    record('responsive mobile viewport fills the full width');
    mobile.iframe.remove();

    document.body.dataset.status = 'pass';
    result.textContent = JSON.stringify({ status: 'pass', checks }, null, 2);
  } catch (err) {
    document.body.dataset.status = 'fail';
    result.textContent = JSON.stringify({ status: 'fail', checks, errors, error: err.stack || err.message }, null, 2);
  }
})();
</script>
</body>
</html>
