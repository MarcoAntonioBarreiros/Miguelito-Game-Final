<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#071820">
  <title>Beans - Protótipo Procedural</title>
  <style>
    :root {
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #071218;
      color: #fff;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: hidden;
      overscroll-behavior: none;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    body { display: flex; align-items: center; justify-content: center; }
    canvas {
      display: block;
      background: #222;
      image-rendering: pixelated;
      width: 100vw;
      height: 100dvh;
      object-fit: contain;
      touch-action: none;
    }
    #debug {
      position: absolute;
      z-index: 20;
      bottom: calc(10px + var(--safe-bottom));
      right: calc(10px + var(--safe-right));
      background: rgba(0,0,0,.62);
      padding: 6px 10px;
      pointer-events: none;
      font: 11px/1.4 ui-monospace, SFMono-Regular, Consolas, monospace;
      max-width: min(360px, 46vw);
      max-height: 46vh;
      overflow: hidden;
      border-radius: 8px;
      transition: opacity .25s;
      white-space: pre-line;
      border: 1px solid rgba(140,230,220,.2);
    }
    #debug.hidden { opacity: 0; }
    /* Narracao. A versao anterior tinha barra de acento, fundo em degrade e
       cantos: parecia slide de apresentacao, nao jogo. Aqui e so texto com
       glow — o mesmo tratamento do nome das colonias — sobre um vinco escuro
       eliptico que desaparece antes de virar aresta. Nenhuma borda para
       aparecer, e legivel mesmo sobre as hifas roxas.
       Maior tambem: e o texto que conta o que acabou de acontecer. */
    #toast {
      position: absolute;
      z-index: 30;
      top: calc(64px + var(--safe-top));
      left: 50%;
      transform: translateX(-50%) translateY(-8px);
      padding: 26px 54px;
      background: radial-gradient(ellipse 62% 58% at 50% 50%,
        rgba(1,10,14,.9) 0%, rgba(1,10,14,.72) 46%, rgba(1,10,14,0) 76%);
      font-size: 23px;
      font-weight: 800;
      line-height: 1.28;
      letter-spacing: -.02em;
      color: #f2fffc;
      text-shadow:
        0 0 3px rgba(0,0,0,.95), 0 2px 10px rgba(0,0,0,.9),
        0 0 22px rgba(108,231,223,.5), 0 0 44px rgba(108,231,223,.22);
      pointer-events: none;
      text-align: center;
      text-wrap: balance;
      width: max-content;
      max-width: min(720px, calc(100vw - 32px));
      opacity: 0;
      transition: opacity .3s ease, transform .3s ease;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* Cartao de abertura da fase: aparece grande no centro, uma vez, e sai.
       Antes a mesma frase era narrada como toast E ficava presa no canto
       esquerdo para sempre — dita duas vezes, e uma delas nunca calava. */
    #phase-card {
      position: absolute;
      z-index: 35;
      inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      /* Centralizado de verdade o cartao briga com o chao e com o personagem,
         que vivem na metade de baixo. Ancorado um pouco acima do meio ele
         respira: o titulo fica no terco superior e a cena continua visivel. */
      justify-content: flex-start;
      padding: clamp(52px, 17vh, 160px) 6vw 0;
      gap: 2px;
      text-align: center;
      pointer-events: none;
      background: radial-gradient(ellipse 62% 40% at 50% 34%,
        rgba(1,10,14,.8) 0%, rgba(1,10,14,.46) 52%, rgba(1,10,14,0) 78%);
    }
    #phase-card.show { display: flex; animation: phase-card-in .85s cubic-bezier(.16,1,.3,1) both; }
    #phase-card.leaving { animation: phase-card-out 1s ease forwards; }
    /* Mesmo corpo do titulo: os dois formam um bloco de titulo de duas linhas,
       nao um rotulo com uma frase embaixo. O tracking cai para .06em porque a
       .42em de rotulo pequeno, aplicada a 62px, viraria uma linha larga demais
       para caber ao lado do nome da fase. */
    #phase-card .eyebrow {
      font-size: clamp(30px, 5.6vw, 62px);
      font-weight: 900;
      line-height: 1.04;
      letter-spacing: .06em;
      text-indent: .06em;
      text-transform: uppercase;
      color: #6ce7df;
      text-shadow:
        0 3px 16px rgba(0,0,0,.92),
        0 0 30px rgba(108,231,223,.6), 0 0 70px rgba(108,231,223,.3);
    }
    #phase-card .title {
      font-size: clamp(30px, 5.6vw, 62px);
      font-weight: 900;
      line-height: 1.04;
      letter-spacing: -.035em;
      color: #f4fffd;
      text-shadow:
        0 3px 16px rgba(0,0,0,.92),
        0 0 32px rgba(108,231,223,.5), 0 0 76px rgba(108,231,223,.26);
    }
    /* 30ch espremia a explicacao em quatro linhas curtas e desiguais debaixo de
       um titulo largo. Com medida mais folgada e text-wrap: balance ela se
       distribui em duas ou tres linhas de comprimento parecido, alinhada com a
       largura do titulo. */
    #phase-card .subtitle {
      margin-top: 18px;
      max-width: min(56ch, 78%);
      font-size: clamp(13px, 1.9vw, 19px);
      font-weight: 600;
      line-height: 1.45;
      text-wrap: balance;
      color: rgba(222,250,245,.9);
      text-shadow: 0 2px 12px rgba(0,0,0,.95), 0 0 24px rgba(0,0,0,.7);
    }
    @keyframes phase-card-in {
      from { opacity: 0; transform: scale(.94) translateY(14px); }
      to { opacity: 1; transform: none; }
    }
    @keyframes phase-card-out {
      from { opacity: 1; }
      to { opacity: 0; transform: scale(1.05); }
    }
    #mission {
      position: absolute;
      z-index: 25;
      top: calc(8px + var(--safe-top));
      left: calc(10px + var(--safe-left));
      max-width: 46vw;
      pointer-events: none;
      padding: 4px 10px 4px 0;
      font-size: 12px;
      color: rgba(255,255,255,.8);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-shadow: 0 2px 6px rgba(0,0,0,.85);
    }

    /* Recursos: um chip por coisa, com o numero grande e o rotulo pequeno. A
       barra antiga era uma frase unica com ate 12 trechos colados por "|" —
       pontos, solo, esperanca, infeccao, contagem de ataques de Trichoderma —
       tudo no mesmo tamanho e na mesma cor. Sem hierarquia, nada se destacava.
       A telemetria saiu daqui: lugar dela e o console do Phase Lab. */
    #hud-stock {
      position: absolute;
      z-index: 25;
      top: calc(8px + var(--safe-top));
      right: calc(10px + var(--safe-right));
      display: flex;
      gap: 6px;
      align-items: stretch;
      pointer-events: none;
    }
    .stock-chip {
      display: flex;
      gap: 7px;
      align-items: center;
      min-width: 62px;
      padding: 5px 10px;
      border: 1px solid rgba(126,214,205,.3);
      border-radius: 11px;
      background: rgba(6,26,32,.82);
      box-shadow: 0 4px 14px rgba(0,0,0,.34);
      backdrop-filter: blur(5px);
    }
    .stock-chip .icon { width: 20px; height: 20px; flex: none; }
    .stock-chip .read { display: grid; line-height: 1; }
    .stock-chip .label {
      font-size: 8.5px;
      font-weight: 800;
      letter-spacing: .09em;
      text-transform: uppercase;
      color: rgba(196,232,226,.66);
    }
    .stock-chip .value {
      margin-top: 2px;
      font-size: 16px;
      font-weight: 800;
      color: #eafffb;
      font-variant-numeric: tabular-nums;
    }
    /* A mao e o unico chip que responde a uma tecla, entao e o unico com
       destaque e com a tecla desenhada. Antes era o rabo de uma frase. */
    .stock-chip.hand {
      border-color: rgba(122,232,214,.72);
      background: rgba(10,45,48,.9);
      box-shadow: 0 4px 16px rgba(0,0,0,.4), 0 0 18px rgba(112,229,214,.16);
    }
    .stock-chip.hand .value { color: #9dfff0; }
    .stock-chip .key {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 17px;
      height: 17px;
      margin-left: 2px;
      padding: 0 4px;
      border: 1px solid rgba(160,255,240,.6);
      border-radius: 5px;
      background: rgba(2,20,24,.9);
      font-size: 9px;
      font-weight: 900;
      color: #b6fff2;
    }
    .stock-chip .swap { font-size: 8.5px; font-weight: 700; color: rgba(150,230,220,.72); }

    /* Alertas: so existem quando ha problema, e ai gritam. Antes viravam mais
       um trecho igual aos outros no meio da frase. */
    #hud-alerts {
      position: absolute;
      z-index: 25;
      top: calc(52px + var(--safe-top));
      right: calc(10px + var(--safe-right));
      display: flex;
      flex-direction: column;
      gap: 4px;
      align-items: flex-end;
      max-width: 44vw;
      pointer-events: none;
    }
    .hud-alert {
      display: flex;
      gap: 6px;
      align-items: center;
      padding: 3px 9px;
      border-radius: 7px;
      border: 1px solid rgba(255,176,102,.52);
      background: rgba(58,29,6,.86);
      color: #ffd9ab;
      font-size: 10.5px;
      font-weight: 800;
      white-space: nowrap;
    }
    .hud-alert.grave {
      border-color: rgba(255,124,142,.6);
      background: rgba(60,10,22,.88);
      color: #ffcdd6;
    }
    #objective-list {
      position: absolute;
      z-index: 25;
      top: calc(130px + var(--safe-top));
      left: calc(10px + var(--safe-left));
      display: flex;
      flex-direction: column;
      gap: 6px;
      pointer-events: none;
      max-width: 320px;
    }
    .objective-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 6px 10px;
      border-radius: 7px;
      background: rgba(6, 26, 32, 0.7);
      border: 1px solid rgba(126, 214, 205, 0.15);
      backdrop-filter: blur(4px);
    }
    .objective-item .circle {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: 2px solid rgba(126, 214, 205, 0.4);
      background: rgba(0, 0, 0, 0.4);
      margin-top: 2px;
      flex-shrink: 0;
      transition: all 0.3s ease;
    }
    .objective-item.completed .circle {
      border-color: #82ffbd;
      background: #82ffbd;
      box-shadow: 0 0 8px rgba(130, 255, 189, 0.6);
    }
    .objective-item .text {
      color: rgba(222, 250, 245, 0.9);
      font-size: 11px;
      font-weight: 600;
      line-height: 1.3;
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.8);
    }

    #touch-controls { display: none; }

    #mobile-tools {
      position: absolute;
      z-index: 55;
      top: calc(38px + var(--safe-top));
      left: calc(10px + var(--safe-left));
      display: flex;
      gap: 6px;
    }

    .touch-device #debug {
      display: none;
      bottom: calc(94px + var(--safe-bottom));
      right: calc(8px + var(--safe-right));
      left: calc(8px + var(--safe-left));
      max-width: none;
      max-height: 34vh;
      padding: 8px 10px;
      font-size: 9px;
      line-height: 1.26;
      background: rgba(0,7,11,.88);
    }
    .touch-device #debug.mobile-visible { display: block; opacity: 1; }
    .touch-device #toast {
      top: calc(52px + var(--safe-top));
      padding: 16px 30px;
      width: auto;
      max-width: min(88vw, 620px);
      /* Continua sendo o texto mais importante: encolhe menos que o resto. */
      font-size: clamp(14px, 3.1vw, 19px);
      line-height: 1.28;
      /* Sem corte. O limite de 3 linhas com max-height cortava a frase no meio
         — "pressione E novamente para inocular" virava "pressione E novamen".
         Uma instrucao pela metade e pior do que ocupar mais duas linhas: o
         jogador fica sem saber o que fazer. Quem manda no tamanho e a frase. */
    }
    .touch-device #mission {
      left: calc(7px + var(--safe-left));
      max-width: 43vw;
      font-size: clamp(9px, 2vw, 11px);
    }
    .touch-device #hud-stock { right: calc(7px + var(--safe-right)); gap: 4px; }
    .touch-device .stock-chip { min-width: 0; gap: 5px; padding: 4px 7px; }
    .touch-device .stock-chip .icon { width: 16px; height: 16px; }
    .touch-device .stock-chip .value { font-size: 13px; }
    .touch-device .stock-chip .label { font-size: 7.5px; }
    .touch-device #hud-alerts { top: calc(44px + var(--safe-top)); right: calc(7px + var(--safe-right)); }
    .touch-device .hud-alert { font-size: 9px; padding: 2px 7px; }

    /* Paisagem de celular: e o modo de jogo, e o que falta e altura. Os chips
       perdem o rotulo e ficam so icone + numero. */
    @media (max-height: 560px) and (orientation: landscape) {
      .stock-chip { min-width: 0; padding: 3px 7px; gap: 5px; }
      .stock-chip .label { display: none; }
      .stock-chip .value { margin-top: 0; font-size: 13px; }
      .stock-chip .icon { width: 16px; height: 16px; }
      #hud-alerts { top: calc(42px + var(--safe-top)); }
    }
    .touch-device #touch-controls {
      position: fixed;
      z-index: 60;
      inset: 0;
      display: block;
      pointer-events: none;
    }
    .touch-cluster {
      position: absolute;
      bottom: calc(10px + var(--safe-bottom));
      display: flex;
      align-items: flex-end;
      gap: clamp(8px, 1.8vw, 14px);
      pointer-events: none;
    }
    .touch-cluster.move { left: calc(10px + var(--safe-left)); }
    .touch-cluster.actions {
      right: calc(10px + var(--safe-right));
      align-items: center;
    }
    .touch-key, .mobile-tool {
      appearance: none;
      border: 1px solid rgba(205,255,245,.42);
      color: #effff9;
      background: rgba(5,31,38,.58);
      box-shadow: 0 5px 18px rgba(0,0,0,.25), inset 0 0 18px rgba(112,229,214,.09);
      backdrop-filter: blur(5px);
      touch-action: none;
      pointer-events: auto;
      font-family: inherit;
      font-weight: 800;
      text-shadow: 0 1px 3px rgba(0,0,0,.6);
    }
    .touch-key {
      width: clamp(54px, 10vw, 76px);
      height: clamp(54px, 10vw, 76px);
      border-radius: 50%;
      font-size: clamp(22px, 4.6vw, 34px);
    }
    .touch-key.primary {
      width: clamp(64px, 12vw, 88px);
      height: clamp(64px, 12vw, 88px);
      background: rgba(67,139,139,.68);
      border-color: rgba(220,255,247,.7);
    }
    .touch-key.small {
      width: clamp(48px, 8.3vw, 64px);
      height: clamp(48px, 8.3vw, 64px);
      font-size: clamp(12px, 2.3vw, 17px);
      letter-spacing: -.2px;
    }
    .touch-key.pressed, .mobile-tool:active {
      transform: scale(.92);
      background: rgba(112,229,214,.82);
      color: #052128;
      box-shadow: 0 0 24px rgba(112,229,214,.5);
    }
    .action-stack { display: grid; gap: 7px; pointer-events: none; }
    .touch-label {
      display: block;
      font-size: .43em;
      line-height: 1;
      margin-top: 2px;
      opacity: .8;
    }
    .touch-device #mobile-tools {
      position: fixed;
      z-index: 70;
      top: calc(6px + var(--safe-top));
      left: calc(10px + var(--safe-left));
      right: auto;
      display: flex;
      gap: 5px;
    }
    .mobile-tool {
      width: 34px;
      height: 30px;
      border-radius: 9px;
      padding: 0;
      font-size: 15px;
    }
    .mobile-tool.zoom-step { width: 30px; }
    .mobile-tool.zoom-value {
      width: 50px;
      font-size: 10px;
      letter-spacing: -.2px;
    }
    .mobile-tool.active, .mobile-tool[aria-pressed="true"] {
      background: rgba(112,229,214,.74);
      color: #052128;
    }

    .touch-device #objective-list {
      top: calc(84px + var(--safe-top));
      left: calc(10px + var(--safe-left));
      pointer-events: auto;
      max-width: 85vw;
      gap: 5px;
    }
    .touch-device .objective-item {
      padding: 2px 4px;
      border: none;
      background: transparent;
      backdrop-filter: none;
      cursor: pointer;
      pointer-events: auto;
      transition: background 0.2s ease, padding 0.2s ease;
    }
    .touch-device .objective-item .text {
      display: none;
    }
    .touch-device .objective-item.expanded {
      background: rgba(6, 26, 32, 0.94);
      border: 1px solid rgba(126, 214, 205, 0.4);
      padding: 6px 10px;
      border-radius: 7px;
      backdrop-filter: blur(8px);
      box-shadow: 0 4px 16px rgba(0,0,0,0.5);
    }
    .touch-device .objective-item.expanded .text {
      display: block;
    }

    #hud-context .mobile-gauge-row {
      display: none;
    }
    .touch-device #hud-context {
      top: calc(42px + var(--safe-top));
      right: calc(10px + var(--safe-right));
      left: auto;
      bottom: auto;
      width: auto;
      max-width: 50vw;
      background: transparent;
      border: none;
      padding: 0;
      pointer-events: auto;
      flex-direction: row;
      flex-wrap: wrap;
      gap: 6px;
    }
    .touch-device #hud-context .context-header,
    .touch-device #hud-context .context-item {
      display: none !important;
    }
    .touch-device #hud-context .mobile-gauge-row {
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
    }
    .mobile-gauge-item {
      position: relative;
      width: 34px;
      height: 34px;
      cursor: pointer;
      pointer-events: auto;
    }
    .mobile-gauge-item .gauge-circle {
      width: 34px;
      height: 34px;
      filter: drop-shadow(0 2px 6px rgba(0,0,0,0.6));
    }
    .mobile-gauge-item .gauge-tooltip {
      display: none;
      position: absolute;
      top: 40px;
      right: 0;
      white-space: nowrap;
      background: rgba(6, 26, 32, 0.94);
      border: 1px solid rgba(126, 214, 205, 0.4);
      color: #ecfff7;
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 10px;
      font-weight: 700;
      z-index: 80;
      box-shadow: 0 4px 14px rgba(0,0,0,0.5);
    }
    .mobile-gauge-item.active .gauge-tooltip,
    .mobile-gauge-item:hover .gauge-tooltip {
      display: block;
    }

    @media (pointer: coarse) and (orientation: portrait) {
      .touch-device #toast { top: calc(70px + var(--safe-top)); max-width: 88vw; }
      .touch-device #mission { max-width: 58vw; }
      /* Retrato e estreito: os chips passam para baixo do objetivo em vez de
         disputarem a mesma linha com ele. */
      .touch-device #hud-stock {
        top: calc(8px + var(--safe-top));
        right: calc(7px + var(--safe-right));
        left: auto;
        flex-wrap: wrap;
        max-width: 84vw;
      }
      .touch-device #hud-alerts {
        top: auto;
        bottom: calc(96px + var(--safe-bottom));
        right: calc(7px + var(--safe-right));
        max-width: 62vw;
      }
      .touch-cluster.actions { gap: 6px; }
      .touch-key { width: 58px; height: 58px; }
      .touch-key.primary { width: 68px; height: 68px; }
      .touch-key.small { width: 48px; height: 48px; }
    }

    @media (max-height: 480px) and (pointer: coarse) {
      .touch-key { width: 52px; height: 52px; font-size: 23px; }
      .touch-key.primary { width: 62px; height: 62px; }
      .touch-key.small { width: 44px; height: 44px; font-size: 12px; }
      .touch-cluster { bottom: calc(5px + var(--safe-bottom)); }
      .touch-device #toast { top: calc(38px + var(--safe-top)); }
    }
    #hud-context {
      position: absolute;
      z-index: 50;
      top: 100px;
      right: 10px;
      width: 240px;
      background: rgba(6, 26, 32, 0.85);
      border: 1px solid rgba(126, 214, 205, 0.4);
      border-radius: 8px;
      padding: 10px;
      color: #ecfff7;
      font: 600 11px/1.2 Inter,system-ui,sans-serif;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      gap: 6px;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    #hud-context.visible {
      opacity: 1;
    }
    .context-header {
      font-size: 12px;
      font-weight: 800;
      color: #7ed6cd;
      border-bottom: 1px solid rgba(126, 214, 205, 0.3);
      padding-bottom: 4px;
      margin-bottom: 4px;
      display: flex;
      justify-content: space-between;
    }
    .context-item {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .context-bar {
      height: 4px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
      overflow: hidden;
    }
    .context-bar-fill {
      height: 100%;
      transition: width 0.3s ease;
    }
    @media (max-width: 600px) {
      #hud-context { top: auto; bottom: calc(80px + var(--safe-bottom)); }
    }
  </style>
</head>
<body>
  <div id="mission"></div>
  <div id="phase-card" aria-live="polite"></div>
  <div id="hud-stock"></div>
  <div id="hud-context"></div>
  <div id="hud-alerts" aria-live="polite"></div>
  <div id="toast"></div>
  <div id="debug"></div>
  <canvas width="1280" height="720" aria-label="Jogo Miguelito e o solo vivo"></canvas>

  <div id="objective-list" aria-live="polite"></div>

  <div id="mobile-tools" aria-label="Ferramentas do jogo">
    <button class="mobile-tool" data-mobile-action="reset" aria-label="Gerar nova fase">↻</button>
    <button class="mobile-tool" data-mobile-action="debug" aria-label="Mostrar informações técnicas" aria-pressed="false">ⓘ</button>
    <button class="mobile-tool" data-mobile-action="fullscreen" aria-label="Tela cheia">⛶</button>
    <button class="mobile-tool" data-mobile-action="toggle-recovery" aria-label="Ligar/desligar plataformas de segurança (tecla T)" aria-pressed="false">⛨</button>
    <button class="mobile-tool zoom-step" data-camera-action="out" aria-label="Afastar câmera">−</button>
    <button class="mobile-tool zoom-value" data-camera-action="reset" data-camera-readout aria-label="Restaurar zoom padrão">1.45×</button>
    <button class="mobile-tool zoom-step" data-camera-action="in" aria-label="Aproximar câmera">+</button>
  </div>

  <div id="touch-controls" hidden aria-label="Controles touch">
    <div class="touch-cluster move">
      <button class="touch-key" data-key="ArrowLeft" aria-label="Mover para esquerda">◀</button>
      <button class="touch-key" data-key="ArrowRight" aria-label="Mover para direita">▶</button>
    </div>
    <div class="touch-cluster actions">
      <div class="action-stack">
        <button class="touch-key small" data-key="ArrowDown" data-mode="tap" aria-label="Trocar acao">↓ TROCAR</button>
        <button class="touch-key small" data-key="ShiftLeft" data-mode="tap" aria-label="Dash">DASH</button>
      </div>
      <button class="touch-key small" data-key="KeyE" aria-label="Acao selecionada">E<span class="touch-label">AÇÃO</span></button>
      <button class="touch-key primary" data-key="Space" aria-label="Pular">↑<span class="touch-label">PULO</span></button>
    </div>
  </div>

  <script type="module" src="./src/procgen/app.js?v=20260721-6"></script>
  <script type="module" src="./src/procgen/mobile-controls.js?v=20260721-6"></script>
</body>
</html>
