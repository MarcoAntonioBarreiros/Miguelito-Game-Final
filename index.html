<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#071820">
  <title>Beans - Protótipo Procedural</title>
  <style>
    :root {
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #071218;
      color: #fff;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: hidden;
      overscroll-behavior: none;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    body { display: flex; align-items: center; justify-content: center; }
    canvas {
      display: block;
      background: #222;
      image-rendering: pixelated;
      width: 100vw;
      height: 100dvh;
      object-fit: contain;
      touch-action: none;
    }
    #debug {
      position: absolute;
      z-index: 20;
      bottom: calc(10px + var(--safe-bottom));
      right: calc(10px + var(--safe-right));
      background: rgba(0,0,0,.62);
      padding: 6px 10px;
      pointer-events: none;
      font: 11px/1.4 ui-monospace, SFMono-Regular, Consolas, monospace;
      max-width: min(360px, 46vw);
      max-height: 46vh;
      overflow: hidden;
      border-radius: 8px;
      transition: opacity .25s;
      white-space: pre-line;
      border: 1px solid rgba(140,230,220,.2);
    }
    #debug.hidden { opacity: 0; }
    #toast {
      position: absolute;
      z-index: 30;
      top: calc(42px + var(--safe-top));
      left: 50%;
      transform: translateX(-50%);
      background: rgba(2,15,21,.88);
      padding: 8px 16px;
      border-radius: 10px;
      font-size: 13px;
      line-height: 1.3;
      pointer-events: none;
      text-align: center;
      width: max-content;
      max-width: min(620px, calc(100vw - 32px));
      opacity: 0;
      transition: opacity .3s;
      border: 1px solid rgba(108,231,223,.35);
      box-shadow: 0 8px 24px rgba(0,0,0,.24);
    }
    #toast.show { opacity: 1; }
    #mission, #hud-bar {
      position: absolute;
      z-index: 25;
      top: calc(8px + var(--safe-top));
      pointer-events: none;
      background: rgba(2,15,21,.48);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 10px;
      padding: 5px 9px;
      backdrop-filter: blur(4px);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #mission {
      left: calc(10px + var(--safe-left));
      max-width: 48vw;
      font-size: 12px;
      color: rgba(255,255,255,.82);
    }
    #hud-bar {
      right: calc(10px + var(--safe-right));
      max-width: 48vw;
      font-size: 11px;
      color: rgba(255,255,255,.76);
      text-align: right;
    }

    #touch-controls, #mobile-tools { display: none; }

    .touch-device #debug {
      display: none;
      bottom: calc(94px + var(--safe-bottom));
      right: calc(8px + var(--safe-right));
      left: calc(8px + var(--safe-left));
      max-width: none;
      max-height: 34vh;
      padding: 8px 10px;
      font-size: 9px;
      line-height: 1.26;
      background: rgba(0,7,11,.88);
    }
    .touch-device #debug.mobile-visible { display: block; opacity: 1; }
    .touch-device #toast {
      top: calc(44px + var(--safe-top));
      padding: 6px 11px;
      width: auto;
      max-width: min(76vw, 520px);
      max-height: 3.25em;
      font-size: clamp(10px, 2.25vw, 12px);
      line-height: 1.25;
      overflow: hidden;
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 2;
    }
    .touch-device #mission {
      left: calc(7px + var(--safe-left));
      max-width: 43vw;
      padding: 4px 7px;
      font-size: clamp(9px, 2vw, 11px);
    }
    .touch-device #hud-bar {
      right: calc(7px + var(--safe-right));
      max-width: 51vw;
      padding: 4px 7px;
      font-size: clamp(8px, 1.8vw, 10px);
    }
    .touch-device #touch-controls {
      position: fixed;
      z-index: 60;
      inset: 0;
      display: block;
      pointer-events: none;
    }
    .touch-cluster {
      position: absolute;
      bottom: calc(10px + var(--safe-bottom));
      display: flex;
      align-items: flex-end;
      gap: clamp(8px, 1.8vw, 14px);
      pointer-events: none;
    }
    .touch-cluster.move { left: calc(10px + var(--safe-left)); }
    .touch-cluster.actions {
      right: calc(10px + var(--safe-right));
      align-items: center;
    }
    .touch-key, .mobile-tool {
      appearance: none;
      border: 1px solid rgba(205,255,245,.42);
      color: #effff9;
      background: rgba(5,31,38,.58);
      box-shadow: 0 5px 18px rgba(0,0,0,.25), inset 0 0 18px rgba(112,229,214,.09);
      backdrop-filter: blur(5px);
      touch-action: none;
      pointer-events: auto;
      font-family: inherit;
      font-weight: 800;
      text-shadow: 0 1px 3px rgba(0,0,0,.6);
    }
    .touch-key {
      width: clamp(54px, 10vw, 76px);
      height: clamp(54px, 10vw, 76px);
      border-radius: 50%;
      font-size: clamp(22px, 4.6vw, 34px);
    }
    .touch-key.primary {
      width: clamp(64px, 12vw, 88px);
      height: clamp(64px, 12vw, 88px);
      background: rgba(67,139,139,.68);
      border-color: rgba(220,255,247,.7);
    }
    .touch-key.small {
      width: clamp(48px, 8.3vw, 64px);
      height: clamp(48px, 8.3vw, 64px);
      font-size: clamp(12px, 2.3vw, 17px);
      letter-spacing: -.2px;
    }
    .touch-key.pressed, .mobile-tool:active {
      transform: scale(.92);
      background: rgba(112,229,214,.82);
      color: #052128;
      box-shadow: 0 0 24px rgba(112,229,214,.5);
    }
    .action-stack { display: grid; gap: 7px; pointer-events: none; }
    .touch-label {
      display: block;
      font-size: .43em;
      line-height: 1;
      margin-top: 2px;
      opacity: .8;
    }
    .touch-device #mobile-tools {
      position: fixed;
      z-index: 70;
      top: calc(42px + var(--safe-top));
      right: calc(7px + var(--safe-right));
      display: flex;
      gap: 5px;
    }
    .mobile-tool {
      width: 34px;
      height: 30px;
      border-radius: 9px;
      padding: 0;
      font-size: 15px;
    }
    .mobile-tool.active, .mobile-tool[aria-pressed="true"] {
      background: rgba(112,229,214,.74);
      color: #052128;
    }

    @media (pointer: coarse) and (orientation: portrait) {
      .touch-device #toast { top: calc(70px + var(--safe-top)); max-width: 88vw; }
      .touch-device #mission { max-width: 58vw; }
      .touch-device #hud-bar {
        top: calc(35px + var(--safe-top));
        left: calc(7px + var(--safe-left));
        right: auto;
        max-width: 78vw;
        text-align: left;
      }
      .touch-device #mobile-tools { top: calc(70px + var(--safe-top)); }
      .touch-cluster.actions { gap: 6px; }
      .touch-key { width: 58px; height: 58px; }
      .touch-key.primary { width: 68px; height: 68px; }
      .touch-key.small { width: 48px; height: 48px; }
    }

    @media (max-height: 480px) and (pointer: coarse) {
      .touch-key { width: 52px; height: 52px; font-size: 23px; }
      .touch-key.primary { width: 62px; height: 62px; }
      .touch-key.small { width: 44px; height: 44px; font-size: 12px; }
      .touch-cluster { bottom: calc(5px + var(--safe-bottom)); }
      .touch-device #toast { top: calc(38px + var(--safe-top)); }
    }
  </style>
</head>
<body>
  <div id="mission"></div>
  <div id="hud-bar"></div>
  <div id="toast"></div>
  <div id="debug"></div>
  <canvas width="1280" height="720" aria-label="Jogo Miguelito e o solo vivo"></canvas>

  <div id="mobile-tools" aria-label="Ferramentas do jogo">
    <button class="mobile-tool" data-mobile-action="reset" aria-label="Gerar nova fase">↻</button>
    <button class="mobile-tool" data-mobile-action="debug" aria-label="Mostrar informações técnicas" aria-pressed="false">ⓘ</button>
    <button class="mobile-tool" data-mobile-action="fullscreen" aria-label="Tela cheia">⛶</button>
  </div>

  <div id="touch-controls" hidden aria-label="Controles touch">
    <div class="touch-cluster move">
      <button class="touch-key" data-key="ArrowLeft" aria-label="Mover para esquerda">◀</button>
      <button class="touch-key" data-key="ArrowRight" aria-label="Mover para direita">▶</button>
    </div>
    <div class="touch-cluster actions">
      <div class="action-stack">
        <button class="touch-key small" data-key="KeyK" data-mode="tap" aria-label="Pulso">PULSO</button>
        <button class="touch-key small" data-key="ShiftLeft" data-mode="tap" aria-label="Dash">DASH</button>
      </div>
      <button class="touch-key small" data-key="KeyE" data-mode="tap" aria-label="Exsudato ou inoculação">E<span class="touch-label">AÇÃO</span></button>
      <button class="touch-key primary" data-key="Space" aria-label="Pular">↑<span class="touch-label">PULO</span></button>
    </div>
  </div>

  <script type="module" src="./src/procgen/app.js"></script>
  <script type="module" src="./src/procgen/mobile-controls.js"></script>
</body>
</html>
