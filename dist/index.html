<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#071820">
  <title>Beans - Protótipo Procedural</title>
  <style>
    :root {
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #071218;
      color: #fff;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: hidden;
      overscroll-behavior: none;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    body { display: flex; align-items: center; justify-content: center; }
    canvas {
      display: block;
      background: #222;
      image-rendering: pixelated;
      width: 100vw;
      height: 100dvh;
      object-fit: contain;
      touch-action: none;
    }
    #debug {
      position: absolute;
      z-index: 20;
      bottom: calc(10px + var(--safe-bottom));
      right: calc(10px + var(--safe-right));
      background: rgba(0,0,0,.62);
      padding: 6px 10px;
      pointer-events: none;
      font: 11px/1.4 ui-monospace, SFMono-Regular, Consolas, monospace;
      max-width: min(360px, 46vw);
      max-height: 46vh;
      overflow: hidden;
      border-radius: 8px;
      transition: opacity .25s;
      white-space: pre-line;
      border: 1px solid rgba(140,230,220,.2);
    }
    #debug.hidden { opacity: 0; }
    #toast {
      position: absolute;
      z-index: 30;
      top: calc(42px + var(--safe-top));
      left: 50%;
      transform: translateX(-50%);
      background: rgba(2,15,21,.88);
      padding: 8px 16px;
      border-radius: 10px;
      font-size: 13px;
      line-height: 1.3;
      pointer-events: none;
      text-align: center;
      width: max-content;
      max-width: min(620px, calc(100vw - 32px));
      opacity: 0;
      transition: opacity .3s;
      border: 1px solid rgba(108,231,223,.35);
      box-shadow: 0 8px 24px rgba(0,0,0,.24);
    }
    #toast.show { opacity: 1; }
    #mission, #hud-bar {
      position: absolute;
      z-index: 25;
      top: calc(8px + var(--safe-top));
      pointer-events: none;
      background: rgba(2,15,21,.48);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 10px;
      padding: 5px 9px;
      backdrop-filter: blur(4px);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #mission {
      left: calc(10px + var(--safe-left));
      max-width: 48vw;
      font-size: 12px;
      color: rgba(255,255,255,.82);
    }
    #hud-bar {
      right: calc(10px + var(--safe-right));
      max-width: 48vw;
      font-size: 11px;
      color: rgba(255,255,255,.76);
      text-align: right;
    }

    #touch-controls, #mobile-tools { display: none; }

    .touch-device #debug {
      display: none;
      bottom: calc(94px + var(--safe-bottom));
      right: calc(8px + var(--safe-right));
      left: calc(8px + var(--safe-left));
      max-width: none;
      max-height: 34vh;
      padding: 8px 10px;
      font-size: 9px;
      line-height: 1.26;
      background: rgba(0,7,11,.88);
    }
    .touch-device #debug.mobile-visible { display: block; opacity: 1; }
    .touch-device #toast {
      top: calc(44px + var(--safe-top));
      padding: 6px 11px;
      width: auto;
      max-width: min(76vw, 520px);
      max-height: 3.25em;
      font-size: clamp(10px, 2.25vw, 12px);
      line-height: 1.25;
      overflow: hidden;
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 2;
    }
    .touch-device #mission {
      left: calc(7px + var(--safe-left));
      max-width: 43vw;
      padding: 4px 7px;
      font-size: clamp(9px, 2vw, 11px);
    }
    .touch-device #hud-bar {
      right: calc(7px + var(--safe-right));
      max-width: 51vw;
      padding: 4px 7px;
      font-size: clamp(8px, 1.8vw, 10px);
    }
    .touch-device #touch-controls {
      position: fixed;
      z-index: 60;
      inset: 0;
      display: block;
      pointer-events: none;
    }
    .touch-cluster {
      position: absolute;
      bottom: calc(10px + var(--safe-bottom));
      display: flex;
      align-items: flex-end;
      gap: clamp(8px, 1.8vw, 14px);
      pointer-events: none;
    }
    .touch-cluster.move { left: calc(10px + var(--safe-left)); }
    .touch-cluster.actions {
      right: calc(10px + var(--safe-right));
      align-items: center;
    }
    .touch-key, .mobile-tool {
      appearance: none;
      border: 1px solid rgba(205,255,245,.42);
      color: #effff9;
      background: rgba(5,31,38,.58);
      box-shadow: 0 5px 18px rgba(0,0,0,.25), inset 0 0 18px rgba(112,229,214,.09);
      backdrop-filter: blur(5px);
      touch-action: none;
      pointer-events: auto;
      font-family: inherit;
      font-weight: 800;
      text-shadow: 0 1px 3px rgba(0,0,0,.6);
    }
    .touch-key {
      width: clamp(54px, 10vw, 76px);
      height: clamp(54px, 10vw, 76px);
      border-radius: 50%;
      font-size: clamp(22px, 4.6vw, 34px);
    }
    .touch-key.primary {
      width: clamp(64px, 12vw, 88px);
      height: clamp(64px, 12vw, 88px);
      background: rgba(67,139,139,.68);
      border-color: rgba(220,255,247,.7);
    }
    .touch-key.small {
      width: clamp(48px, 8.3vw, 64px);
      height: clamp(48px, 8.3vw, 64px);
      font-size: clamp(12px, 2.3vw, 17px);
      letter-spacing: -.2px;
    }
    .touch-key.pressed, .mobile-tool:active {
      transform: scale(.92);
      background: rgba(112,229,214,.82);
      color: #052128;
      box-shadow: 0 0 24px rgba(112,229,214,.5);
    }
    .action-stack { display: grid; gap: 7px; pointer-events: none; }
    .touch-label {
      display: block;
      font-size: .43em;
      line-height: 1;
      margin-top: 2px;
      opacity: .8;
    }
    .touch-device #mobile-tools {
      position: fixed;
      z-index: 70;
      top: calc(42px + var(--safe-top));
      right: calc(7px + var(--safe-right));
      display: flex;
      gap: 5px;
    }
    .mobile-tool {
      width: 34px;
      height: 30px;
      border-radius: 9px;
      padding: 0;
      font-size: 15px;
    }
    .mobile-tool.zoom-step { width: 30px; }
    .mobile-tool.zoom-value {
      width: 50px;
      font-size: 10px;
      letter-spacing: -.2px;
    }
    .mobile-tool.active, .mobile-tool[aria-pressed="true"] {
      background: rgba(112,229,214,.74);
      color: #052128;
    }

    @media (pointer: coarse) and (orientation: portrait) {
      .touch-device #toast { top: calc(70px + var(--safe-top)); max-width: 88vw; }
      .touch-device #mission { max-width: 58vw; }
      .touch-device #hud-bar {
        top: calc(35px + var(--safe-top));
        left: calc(7px + var(--safe-left));
        right: auto;
        max-width: 78vw;
        text-align: left;
      }
      .touch-device #mobile-tools { top: calc(70px + var(--safe-top)); }
      .touch-cluster.actions { gap: 6px; }
      .touch-key { width: 58px; height: 58px; }
      .touch-key.primary { width: 68px; height: 68px; }
      .touch-key.small { width: 48px; height: 48px; }
    }

    @media (max-height: 480px) and (pointer: coarse) {
      .touch-key { width: 52px; height: 52px; font-size: 23px; }
      .touch-key.primary { width: 62px; height: 62px; }
      .touch-key.small { width: 44px; height: 44px; font-size: 12px; }
      .touch-cluster { bottom: calc(5px + var(--safe-bottom)); }
      .touch-device #toast { top: calc(38px + var(--safe-top)); }
    }
  </style>
<style data-tutorial-styles>
#tutorial-library-button {
  position: fixed;
  z-index: 82;
  top: calc(44px + var(--safe-top));
  right: calc(10px + var(--safe-right));
  display: inline-flex;
  align-items: center;
  gap: 7px;
  min-height: 34px;
  padding: 0 12px;
  border: 1px solid rgba(196,255,244,.42);
  border-radius: 10px;
  color: #effff9;
  background: rgba(5,31,38,.7);
  box-shadow: 0 5px 18px rgba(0,0,0,.28), inset 0 0 18px rgba(112,229,214,.08);
  backdrop-filter: blur(7px);
  font: 800 12px/1 Inter,system-ui,sans-serif;
  cursor: pointer;
  touch-action: manipulation;
}
#tutorial-library-button:hover,
#tutorial-library-button:focus-visible {
  background: rgba(69,151,148,.84);
  outline: 2px solid rgba(220,255,247,.76);
  outline-offset: 2px;
}
.touch-device #tutorial-library-button { display: none; }

.tutorial-overlay {
  position: fixed;
  z-index: 220;
  inset: 0;
  display: grid;
  place-items: center;
  padding: calc(18px + var(--safe-top)) calc(18px + var(--safe-right)) calc(18px + var(--safe-bottom)) calc(18px + var(--safe-left));
  touch-action: none;
}
.tutorial-overlay[hidden] { display: none; }
.tutorial-backdrop {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at 50% 42%, rgba(50,167,159,.2), transparent 38%),
    rgba(1,8,12,.84);
  backdrop-filter: blur(7px) saturate(.72);
}
.tutorial-panel {
  --tutorial-accent: #70e5d6;
  position: relative;
  z-index: 1;
  width: min(920px, 96vw);
  max-height: min(90dvh, 760px);
  overflow: hidden;
  border: 1px solid color-mix(in srgb, var(--tutorial-accent) 68%, transparent);
  border-radius: 22px;
  color: #effff9;
  background:
    linear-gradient(135deg, rgba(10,43,49,.97), rgba(3,17,25,.985) 56%, rgba(7,30,37,.98)),
    #071b22;
  box-shadow:
    0 30px 80px rgba(0,0,0,.62),
    0 0 42px color-mix(in srgb, var(--tutorial-accent) 18%, transparent),
    inset 0 0 42px rgba(104,231,220,.05);
  isolation: isolate;
}
.tutorial-panel::before,
.tutorial-panel::after {
  content: '';
  position: absolute;
  pointer-events: none;
}
.tutorial-panel::before {
  inset: 10px;
  border: 1px solid color-mix(in srgb, var(--tutorial-accent) 24%, transparent);
  border-radius: 15px;
}
.tutorial-panel::after {
  width: 220px;
  height: 220px;
  right: -95px;
  top: -110px;
  border-radius: 50%;
  background: color-mix(in srgb, var(--tutorial-accent) 18%, transparent);
  filter: blur(28px);
}
.tutorial-scanlines {
  position: absolute;
  z-index: -1;
  inset: 0;
  opacity: .16;
  pointer-events: none;
  background: repeating-linear-gradient(
    to bottom,
    transparent 0,
    transparent 4px,
    rgba(211,255,247,.13) 5px,
    transparent 6px
  );
  animation: tutorial-scan 10s linear infinite;
}
@keyframes tutorial-scan {
  from { transform: translateY(-16px); }
  to { transform: translateY(16px); }
}
.tutorial-close {
  position: absolute;
  z-index: 5;
  top: 14px;
  right: 14px;
  width: 38px;
  height: 38px;
  border: 1px solid rgba(226,255,250,.36);
  border-radius: 50%;
  color: #f1fffb;
  background: rgba(3,20,27,.78);
  font: 400 27px/1 system-ui,sans-serif;
  cursor: pointer;
  touch-action: manipulation;
}
.tutorial-close:hover,
.tutorial-close:focus-visible {
  background: color-mix(in srgb, var(--tutorial-accent) 42%, rgba(3,20,27,.9));
  outline: 2px solid var(--tutorial-accent);
  outline-offset: 2px;
}
.tutorial-card-view,
.tutorial-library-view {
  position: relative;
  max-height: min(90dvh, 760px);
  overflow: auto;
  scrollbar-color: color-mix(in srgb, var(--tutorial-accent) 55%, transparent) rgba(0,0,0,.2);
}
.tutorial-card-view { padding: 28px 32px 24px; }
.tutorial-header { padding-right: 46px; }
.tutorial-heading-meta {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 8px;
}
.tutorial-category,
.tutorial-new-badge {
  display: inline-flex;
  align-items: center;
  min-height: 24px;
  padding: 0 10px;
  border-radius: 999px;
  font-size: 10px;
  font-weight: 900;
  letter-spacing: .1em;
  text-transform: uppercase;
}
.tutorial-category {
  color: color-mix(in srgb, var(--tutorial-accent) 86%, white);
  border: 1px solid color-mix(in srgb, var(--tutorial-accent) 45%, transparent);
  background: color-mix(in srgb, var(--tutorial-accent) 11%, transparent);
}
.tutorial-new-badge {

  background: var(--tutorial-accent);

}
.tutorial-title,
.tutorial-library-title {
  margin: 0;
  color: #f4fffc;
  font-size: clamp(26px, 4vw, 44px);
  line-height: 1.04;
  letter-spacing: -.035em;
}
.tutorial-subtitle,
.tutorial-library-description {
  margin: 7px 0 0;
  color: rgba(231,255,249,.72);
  font-size: clamp(13px, 1.8vw, 17px);
  line-height: 1.4;
}
.tutorial-content {
  display: grid;
  grid-template-columns: minmax(215px, 280px) minmax(0, 1fr);
  gap: 30px;
  align-items: stretch;
  margin-top: 24px;
}
.tutorial-visual {
  position: relative;
  min-height: 390px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  border: 1px solid color-mix(in srgb, var(--tutorial-accent) 34%, transparent);
  border-radius: 18px;
  background:
    radial-gradient(circle at 50% 37%, color-mix(in srgb, var(--tutorial-accent) 24%, transparent), transparent 36%),
    linear-gradient(180deg, rgba(3,25,31,.62), rgba(2,13,20,.78));
}
.tutorial-visual::after {
  content: '';
  position: absolute;
  left: 12%;
  right: 12%;
  bottom: 103px;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--tutorial-accent), transparent);
  box-shadow: 0 0 18px var(--tutorial-accent);
}
.tutorial-hologram-ring {
  position: absolute;
  left: 50%;
  top: 38%;
  border: 1px solid color-mix(in srgb, var(--tutorial-accent) 65%, transparent);
  border-radius: 50%;
  transform: translate(-50%, -50%);
  box-shadow: 0 0 22px color-mix(in srgb, var(--tutorial-accent) 18%, transparent);
}
.ring-one {
  width: 165px;
  height: 165px;

}
.ring-two {
  width: 120px;
  height: 120px;
  border-style: dashed;
  animation: tutorial-ring-reverse 6s linear infinite;
}
@keyframes tutorial-ring {
  from { transform: translate(-50%, -50%) rotate(0); }
  to { transform: translate(-50%, -50%) rotate(360deg); }
}
@keyframes tutorial-ring-reverse {
  from { transform: translate(-50%, -50%) rotate(360deg); }
  to { transform: translate(-50%, -50%) rotate(0); }
}
.tutorial-glyph {
  position: relative;
  z-index: 2;
  display: grid;
  place-items: center;
  width: 112px;
  height: 112px;
  margin-bottom: 108px;
  color: #f4fffc;
  border: 1px solid color-mix(in srgb, var(--tutorial-accent) 72%, transparent);
  border-radius: 50%;
  background: color-mix(in srgb, var(--tutorial-accent) 16%, rgba(2,15,21,.88));
  box-shadow:
    0 0 30px color-mix(in srgb, var(--tutorial-accent) 38%, transparent),
    inset 0 0 26px color-mix(in srgb, var(--tutorial-accent) 16%, transparent);
  font: 900 clamp(24px, 4vw, 38px)/1 ui-monospace,monospace;
  letter-spacing: -.08em;
  text-shadow: 0 0 14px var(--tutorial-accent);
}
.tutorial-cycle-block {

  bottom: 17px;
}
.tutorial-cycle-label {
  display: block;
  margin-bottom: 8px;

  font-size: 9px;
  font-weight: 900;
  letter-spacing: .12em;

.tutorial-cycle {

.tutorial-page-title {

function createRandom(seedString) {
  let seed = 0;
  for (let i = 0; i < seedString.length; i++) {
    seed = Math.imul(31, seed) + seedString.charCodeAt(i) | 0;
  }

  // Mulberry32
  return function() {
    let t = seed += 0x6D2B79F5;
    t = Math.imul(t ^ t >>> 15, t | 1);
    t ^= t + Math.imul(t ^ t >>> 7, t | 61);
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  }
}

const campaignManifest = Object.freeze(phases);

function getPhaseManifest(phase) {
  return campaignManifest.find(entry => entry.phase === phase) || null;
}

function getSegmentAt(phase, chunkIndex) {
  return getPhaseManifest(phase)?.segments.find(s => chunkIndex >= s.from && chunkIndex <= s.to) || null;

        y: checkpoint.y + 8,
        radius: 72,

    ctx.fillStyle = vignette;
    ctx.fillRect(0, 0, W, H);
    ctx.restore();
  }

  function render(ctx) {
    ctx.save();
    ctx.translate(-state.cameraX, 0);
    for (const cloud of clouds) drawCloud(ctx, cloud);

      const progress = clamp(candidate.progress / 3.4, 0, 1);

    get cloudCount() { return clouds.length; },
    get deployedCloudCount() { return deployedCloudCount; },
    get biofilmCount() { return biofilms.length; },
    clear,
    reset,
    prepare,
    update,
    render,
  };
}

},

    return Math.hypot(center.x - film.x, center.y - film.y) < Math.max(28, film.radius);

function rootBacillusDefense(state, root, x) {
  let defense = 0;
  for (const film of state.level.biofilms || []) {
    if (film.platform !== root || !film.functional) continue;
    const radius = Math.max(16, film.radius || film.targetRadius || 0);
    const distance = Math.abs((film.x || 0) - x);
    if (distance >= radius) continue;
    defense = Math.max(defense, clamp(film.protectionStrength || .45, .2, 1) * (1 - distance / radius));
  }
  return defense;
}

function createPathogenSurvival({ state, entities, ecology }) {
  const rootMemory = new WeakMap();
  let lastToastAt = -Infinity;
  let attachToastShown = false;
  let transferToastAt = -Infinity;
  const dom = ensureDom();

  function announce(text, seconds = 4.8, cooldown = 1.7) {
    if (state.time - lastToastAt < cooldown) return;
    state.toast = text;
    state.toastTime = seconds;
    lastToastAt = state.time;
  }

  function updateDom() {

    const player = state.player;
    const vitality = clamp(Math.round(player.vitality || 0), 0, player.maxVitality || 5);
    const max = player.maxVitality || 5;
    const filled = '♥'.repeat(vitality);
    const empty = '♡'.repeat(Math.max(0, max - vitality));
    dom.hud.querySelector('.hearts').textContent = `${filled}${empty}`;

    const infection = clamp(player.infection || 0, 0, 1);
    const load = player.nematodeLoad || 0;

    if (state.gameState === 'respawning') condition = 'Reorganizando no último biofilme…';
    else if (infection >= .72) condition = `Colonização fúngica ${Math.round(infection * 100)}%`;
    else if (infection >= .28) condition = `Propágulos aderidos ${Math.round(infection * 100)}%`;
    else if (load) condition = `${load} J2 transportado${load > 1 ? 's' : ''}`;
    else condition = 'Integridade estável';
    dom.hud.querySelector('.condition').textContent = condition;

        infection > .28 ? (infection - .28) / .72 : 0,
        vitality <= 2 ? (3 - vitality) * .24 : 0,

      juvenile.carriedByPlayer = false;
      juvenile.cooldown = 0;
      if (remove) juvenile.alive = false;
    }
    state.player.nematodeLoad = 0;

    if (state.gameState !== 'play' || !player.alive || (player.invuln > 0 && !options.fatal)) return false;

    const damage = Math.max(1, Math.round(amount));
    player.vitality = Math.max(0, (player.vitality ?? player.maxVitality ?? 5) - damage);
    player.invuln = options.invuln ?? 1.05;
    player.infection = clamp((player.infection || 0) + (options.infection || 0), 0, 1);
    player.vx = options.knockbackX ?? (-player.facing * 250);
    player.vy = options.knockbackY ?? -245;
    state.shake = Math.max(state.shake || 0, damage > 1 ? .42 : .3);
    entities.burst(
      player.x + player.w / 2,
      player.y + player.h / 2,
      damage > 1 ? '#ff4d77' : '#ff8297',
      18 + damage * 8,
      175 + damage * 40,
    );

    announce(`${source}: Miguelito perdeu ${damage} ${damage === 1 ? 'coração' : 'corações'}.`, 3.6, .55);

    if (player.vitality <= 0 || options.fatal) {
      player.vitality = 0;
      player.alive = false;
      player.deaths = (player.deaths || 0) + 1;
      player.deathFlash = 1;
      player.vx = 0;
      player.vy = 0;
      state.gameState = 'respawning';
      state.respawnTimer = .72;
      announce(`Miguelito foi vencido por ${source}. Retorno ao último biofilme ativo.`, 4.2, 0);
    }
    return true;
  }

  entities.damagePlayer = damagePlayer;

  function nearestTrichodermaDistance() {
    const center = playerCenter(state.player);
    let best = Infinity;
    for (const agent of ecology.agents || []) {
      if (agent.type !== 'trichoderma') continue;
      best = Math.min(best, Math.hypot(agent.x - center.x, agent.y - center.y));
    }
    for (const colony of state.trichodermaColonies?.colonies || []) {
      best = Math.min(best, Math.hypot(colony.x - center.x, colony.y - center.y));
    }
    return best;

    juvenile.carriedByPlayer = true;
    juvenile.carryTime = 0;
    juvenile.carrySlot = slot;
    juvenile.targetRoot = null;
    juvenile.cooldown = Number.POSITIVE_INFINITY;
    juvenile.retarget = Number.POSITIVE_INFINITY;
    juvenile.vx = 0;
    juvenile.vy = 0;
    if (!attachToastShown) {
      attachToastShown = true;
      announce(
        'Transporte de J2: o juvenil aderiu à roupa de Miguelito. Ele não parasita o personagem, mas reduz sua mobilidade e pode ser levado até outra raiz.',
        6.2,
        0,
      );

      const distance = Math.hypot(juvenile.x - center.x, juvenile.y - center.y);
      if (distance < 23) {
        attachJ2(juvenile, carried.length);
        carried.push(juvenile);

        pulseActive
          ? `Pulso mineral removeu ${removed} J2 transportado${removed > 1 ? 's' : ''}.`

        .8,

      entities.burst(center.x, center.y + 12, pulseActive ? '#ffcf8a' : '#a8ffe6', 18, 120);

      juvenile.vy = player.vy;
      juvenile.cooldown = Number.POSITIVE_INFINITY;
      juvenile.retarget = Number.POSITIVE_INFINITY;
      juvenile.targetRoot = null;

      if (
        root
        && juvenile.carryTime > 2.2
        && rootBacillusDefense(state, root, center.x) < .42
        && Math.random() < dt * .34

        juvenile.carriedByPlayer = false;
        juvenile.cooldown = 0;
        juvenile.retarget = 0;
        juvenile.targetRoot = root;
        juvenile.targetX = clamp(center.x, root.x + 18, root.x + root.w - 18);
        juvenile.x = juvenile.targetX;
        juvenile.y = root.y - 10;
        if (state.time - transferToastAt > 4) {
          transferToastAt = state.time;
          announce('Dispersão passiva: um J2 transportado deixou Miguelito e começou a procurar entrada na raiz sob seus pés.', 5.2, 0);
        }
      }
    });

    carried = juveniles.filter(juvenile => juvenile.alive && juvenile.carriedByPlayer);
    player.nematodeLoad = carried.length;
    player.nematodeDamageCooldown = Math.max(0, (player.nematodeDamageCooldown || 0) - dt);

      damagePlayer(1, 'estresse por J2 transportado', { invuln: .95, knockbackX: player.vx * -.25, knockbackY: -115 });

  }

      const pressure = clamp(root.rhizoctoniaPressure || 0, 0, 1);
      if (pressure > 0) {
        root.rootDamage = clamp((root.rootDamage || 0) + dt * pressure * .012, 0, .94);
        root.rootHealth = clamp(1 - root.rootDamage, .06, 1);
      }

      const previous = rootMemory.get(root);
      const health = Number.isFinite(root.rootHealth) ? root.rootHealth : 1;
      if (previous != null) {
        const delta = health - previous;
        if (Math.abs(delta) > .00035) {
          root.healthTrend = delta > 0 ? 1 : -1;
          root.healthTrendTime = .65;
        }
      }
      rootMemory.set(root, health);
      root.healthTrendTime = Math.max(0, (root.healthTrendTime || 0) - dt);
      if (root.healthTrendTime <= 0) root.healthTrend = 0;
    }
  }

  function prepare() {
    const player = state.player;
    const infection = clamp(player.infection || 0, 0, 1);
    const load = player.nematodeLoad || 0;
    player.moveMultiplier = clamp(1 - infection * .34 - load * .1, .48, 1);
    player.jumpMultiplier = clamp(1 - infection * .16 - load * .08, .68, 1);
    player.dashCooldownMultiplier = 1 + infection * .65 + load * .25;
    player.dashSuppressed = load >= 2 || infection >= .92;
  }

  function update(dt) {
    const player = state.player;
    player.deathFlash = Math.max(0, (player.deathFlash || 0) - dt * 1.7);

    if (state.gameState === 'respawning') {
      state.respawnTimer = Math.max(0, (state.respawnTimer || 0) - dt);
      if (state.respawnTimer <= 0) entities.respawn('death');
      updateDom();
      return;
    }
    if (state.gameState !== 'play') {
      updateDom();
      return;
    }

    player.fungalDamageCooldown = Math.max(0, (player.fungalDamageCooldown || 0) - dt);
    player.healCooldown = Math.max(0, (player.healCooldown || 0) - dt);

    const trichodermaDistance = nearestTrichodermaDistance();
    if (trichodermaDistance < 125 && player.infection > 0) {
      const strength = 1 - trichodermaDistance / 125;
      player.infection = Math.max(0, player.infection - dt * (.045 + strength * .18));
      player.infectionExposure = Math.max(0, (player.infectionExposure || 0) - dt * (.16 + strength * .7));
    }

    const film = filmProtectsPlayer(state);
    if (film) {
      if (player.vitality < player.maxVitality && player.healCooldown <= 0) {
        player.vitality++;
        player.healCooldown = 4.2;
        announce('Zona segura de Bacillus: um coração de Vitalidade foi recuperado.', 3.6, .7);
        entities.burst(player.x + 16, player.y + 24, '#a8ffe6', 16, 95);
      }
    }

    const infection = clamp(player.infection || 0, 0, 1);
    if (infection >= .68 && player.fungalDamageCooldown <= 0) {
      damagePlayer(1, 'colonização fúngica', {
        infection: .015,
        invuln: .9,
        knockbackX: player.vx * -.18,
        knockbackY: -95,
      });
      player.fungalDamageCooldown = infection >= .92 ? 1.85 : infection >= .8 ? 2.35 : 2.9;
    }

    updateCarriedJ2(dt);
    updateRootStress(dt);
    updateDom();
  }

  function clear() {
    clearCarriedJ2(false);
    attachToastShown = false;
    lastToastAt = -Infinity;
    transferToastAt = -Infinity;
    updateDom();
  }

  function reset() {
    clear();
    state.player.vitality = state.player.maxVitality || 5;
    state.player.infection = 0;
    state.player.infectionExposure = 0;
    state.player.nematodeLoad = 0;
    state.player.healCooldown = 0;
    state.player.fungalDamageCooldown = 0;
    state.player.nematodeDamageCooldown = 0;
    prepare();
    updateDom();
  }

  return {
    prepare,
    update,
    clear,
    reset,
    damagePlayer,
    clearCarriedJ2,
    get carriedJ2Count() {
      return (state.level.nematodeJuveniles || []).filter(juvenile => juvenile.alive && juvenile.carriedByPlayer).length;
    },
  };
}

},

function generateGeometry(logicChunk, prevPlatform, primitive, rnd) {
  // Use primitive displacement to calculate target platform position
  let dx = primitive.displacement.x;
  let dy = primitive.displacement.y;

  // Stretch factor: comfortable = 60-85%, hard = 80-95%
  let stretch;
  if (logicChunk.difficultyTarget === 'hard') {
    stretch = 0.80 + rnd() * 0.15;
  } else {
    stretch = 0.60 + rnd() * 0.25;
  }

  // Calculate horizontal gap
  dx = Math.abs(dx) * stretch;
  // Ensure minimum gap so platforms don't overlap
  dx = Math.max(dx, 60);

  // Vertical variation: create wave-like terrain
  // Use chunk index to create natural ups and downs
  const chunkIndex = logicChunk.index || 0;
  const wavePhase = chunkIndex * 0.31; // creates organic-feeling waves
  const waveAmplitude = 120; // max vertical swing
  const baseWave = Math.sin(wavePhase) * waveAmplitude;

  // Add local randomness on top of the wave
  const localVariation = (rnd() - 0.5) * 80;

  // For skill intro chunks, keep height difference moderate
  let targetDy;
  if (logicChunk.isSkillIntro || logicChunk.allyId) {
    targetDy = (rnd() - 0.5) * 40; // gentle variation for learning moments
  } else {
    targetDy = baseWave * 0.3 + localVariation;

    // For double jump, allow reaching higher platforms
    if (primitive.requires.includes('doubleJump')) {
      targetDy = -40 - rnd() * 80; // tend upward
    }
    // For dash, keep roughly same height
    if (primitive.requires.includes('dash')) {
      targetDy = (rnd() - 0.5) * 30;
    }
  }

  // Platform width variation
  let platW;
  if (logicChunk.isSkillIntro || logicChunk.allyId || logicChunk.isCheckpoint) {
    platW = 150 + rnd() * 80; // wide safe platforms for important moments
  } else if (logicChunk.difficultyTarget === 'hard') {
    platW = 60 + rnd() * 40; // narrow for challenge
  } else {
    platW = 80 + rnd() * 100; // medium variety
  }

  let platH = 40 + rnd() * 60;

  let newPlat = {
    x: prevPlatform.x + prevPlatform.w + dx,
    y: prevPlatform.y + targetDy,
    w: platW,
    h: platH,
    type: rnd() > 0.3 ? 'root' : 'soil'
  };

  // Clamp Y to keep within visible play area (200 to 580)
  // But use soft clamping — nudge rather than snap
  if (newPlat.y < 220) {
    newPlat.y = 220 + rnd() * 60;
  } else if (newPlat.y > 560) {
    newPlat.y = 560 - rnd() * 60;
  }

  return newPlat;
}

function validateChunk(fromPlatform, toPlatform, primitive, agentType = 'normal') {

  sim.state.level.platforms = [fromPlatform, toPlatform];
  sim.state.level.hazards = [];

  sim.state.level.cameraMaxX = Math.max(0, validationEnd - 1280);

  else if (agentType === 'error-early') jumpTiming = -9;

      phase = 'airborne';

      releaseFrames++;

        keys = { ArrowRight: true, Space: true };
        hasDoubleJumped = true;
        releaseFrames = 0;
      }
      if (isDash && !hasDashed && airFrames > 9 && sim.state.player.vy >= -90) {
        keys = { ArrowRight: true, ShiftLeft: true };
        hasDashed = true;
      }
    }

    sim.setInputs(keys);
    sim.step(DT);
    frames++;

    const p = sim.state.player;

      p.onGround

      && p.x < toPlatform.x + toPlatform.w - 4
      && Math.abs(p.y - (toPlatform.y - 48)) < 12

"src/procgen/campaign-encounters.js": (__exports, __require) => {
const { createRandom } = __require("src/procgen/random.js");
const { getPhaseManifest, getProceduralPoolAt, getRoamingDebutsAt } = __require("src/procgen/campaign-manifest.js");
const MIN_ZONE_SPACING = 390;
const MIN_DEBUT_CLEARANCE = 430;
const MIN_NEWCOMER_SEPARATION = 440;

function shuffledBag(types, random) {
  const bag = [...types];
  for (let i = bag.length - 1; i > 0; i--) {
    const j = Math.floor(random() * (i + 1));
    [bag[i], bag[j]] = [bag[j], bag[i]];
  }
  return bag;
}

function routePlatforms(platforms) {
  return platforms
    .filter(platform => !platform.recovery && !platform.final && platform.logicIndex >= 0 && platform.w >= 100)
    .sort((a, b) => a.logicIndex - b.logicIndex || a.x - b.x);
}

function platformForChunk(platforms, chunkIndex) {
  return platforms.find(platform => platform.logicIndex === chunkIndex) || null;
}

function zonePosition(platform, random) {
  const lateral = (random() - .5) * Math.min(platform.w * .28, 54);
  return {
    x: platform.x + platform.w / 2 + lateral,
    y: Math.max(95, platform.y - 88 - random() * 42),
  };
}

function nearAnyDebut(x, debutZones) {
  return debutZones.some(zone => Math.abs(zone.x - x) < MIN_DEBUT_CLEARANCE);
}

function generateCampaignEncounters({ platforms, phase, seedValue }) {
  const manifest = getPhaseManifest(phase);
  if (!manifest) return [];

  const random = createRandom(`${seedValue}:campaign-encounters:p${phase}`);
  const route = routePlatforms(platforms);
  const encounters = [];
  const debutZones = [];
  const currentPhaseCards = new Map();
  for (const presentation of manifest.presentations) {
    const types = presentation.roamingType
      ? [presentation.roamingType]
      : Array.isArray(presentation.roamingTypes) ? presentation.roamingTypes : [];
    for (const type of types) currentPhaseCards.set(type, presentation.cardId);
  }

  for (const chunk of route) {
    for (const debut of getRoamingDebutsAt(phase, chunk.logicIndex)) {
      const platform = platformForChunk(route, chunk.logicIndex);
      if (!platform) continue;
      const position = zonePosition(platform, random);
      const zone = {
        id: debut.type,
        x: position.x,
        y: position.y,
        r: 155,
        territory: 620,
        collect: false,
        logicIndex: chunk.logicIndex,
        source: 'debut',
        cardId: debut.cardId,
        presentationId: debut.presentationId,
        debutZoneId: debut.debutZoneId,
        tetherUntilSeen: debut.tetherUntilSeen,
        tetherRadius: 165,
      };
      const overlappingDebut = debutZones.find(existing => (
        Math.hypot(existing.x - zone.x, existing.y - zone.y) <= MIN_NEWCOMER_SEPARATION
      ));
      if (overlappingDebut) {
        throw new Error(
          `Estreias inéditas simultâneas na fase ${phase}: ${overlappingDebut.id}/${zone.id}`,
        );
      }
      encounters.push(zone);
      debutZones.push(zone);
    }

  let bag = [];
  let bagKey = '';
  let previousType = null;
  let nextSpawnX = 430 + random() * 190;

  for (const platform of route) {
    if (platform.x < nextSpawnX || nearAnyDebut(platform.x + platform.w / 2, debutZones)) continue;
    const pool = getProceduralPoolAt(phase, platform.logicIndex);
    if (!pool.length) continue;

    const currentKey = pool.join('|');
    if (currentKey !== bagKey) {
      bag = shuffledBag(pool, random);
      bagKey = currentKey;
    } else if (!bag.length) {
      bag = shuffledBag(pool, random);

    let type = bag.pop();
    if (type === previousType && bag.length) {
      bag.unshift(type);
      type = bag.pop();

    previousType = type;
    const position = zonePosition(platform, random);
    encounters.push({
      id: type,
      x: position.x,
      y: position.y,
      r: 145 + random() * 65,
      territory: 520 + random() * 720,
      collect: false,
      logicIndex: platform.logicIndex,
      source: 'procedural',
      requiresSeenCardId: currentPhaseCards.get(type) || null,
    });
    nextSpawnX = platform.x + MIN_ZONE_SPACING + random() * 360;
  }

  return encounters;
}
Object.assign(__exports, { generateCampaignEncounters });
},

        && attack.target.eggs > 0
        && !attack.target.neutralized;

      && attack.target.alive
      && attack.target.state === 'seeking'

    state.level.ralstoniaFoci = foci;
    nextId = 1;
    initialized = false;
    lastToastAt = -Infinity;
    neutralizedCount = 0;
    criticalCount = 0;

    get neutralizedCount() { return neutralizedCount; },

        detail: action.diagnostic,
      }));

    pendingMandatory = null;
    removeStoredTutorialProgress();

      force: true,
      tutorialMode: 'guided',
      affectsPacing: false,

  nextButton.addEventListener('click', nextPage);

  mobileLibraryButton?.addEventListener('click', event => {

  });

      return;

      addCandidate(cardId, distance, { type: zone.id, source: 'community' });

    for (const ally of state.level.allies || []) {
      if (!ally.presentationOnly) continue;
      const cardId = ally.cardId || discoveryCards[ally.id];
      const distance = distanceToPlayer(ally.x, ally.y);
      if (distance > TUTORIAL_PROXIMITY.organism) continue;
      addCandidate(cardId, distance, { type: ally.id, source: 'fixed-debut' });
    }

    for (const enemy of state.level.enemies || []) {
      if (!enemy.alive || (enemy.type !== 'rhizoctonia' && !Number.isFinite(enemy.colonization))) continue;
      const distance = distanceToPlayer(
        enemy.x + (enemy.w || 0) / 2,
        enemy.y + (enemy.h || 0) / 2,
      );
      if (distance <= TUTORIAL_PROXIMITY.organism) {
        addCandidate('organism-rhizoctonia', distance, { source: 'enemy' });
      }
    }

    for (const focus of ralstoniaControl.foci || []) {
      if (focus.neutralized) continue;
      const distance = distanceToPlatform(focus.root);
      if (distance <= TUTORIAL_PROXIMITY.rootProcess) {
        addCandidate('organism-ralstonia', distance, { source: 'focus' });
      }
    }

    for (const juvenile of sim.meloidogyneLifecycle.juveniles || []) {
      if (!juvenile.alive) continue;
      const distance = distanceToPlayer(juvenile.x, juvenile.y);
      if (distance <= TUTORIAL_PROXIMITY.organism) {
        addCandidate('organism-meloidogyne-j2', distance, { source: 'juvenile' });
      }
    }

    for (const gall of sim.meloidogyneLifecycle.galls || []) {
      if (gall.progress < .78) continue;
      const distance = distanceToPlayer(gall.x, gall.platform?.y ?? gall.y);
      if (distance <= TUTORIAL_PROXIMITY.structure) {
        addCandidate('organism-meloidogyne-female', distance, { source: 'gall' });
      }
    }

    return [...candidatesByCard.values()]
      .sort((a, b) => a.distance - b.distance || a.cardId.localeCompare(b.cardId));
  }

  function triggerNearestOrganism() {

    if (candidates.length > 1) {

      const detail = {
        phase: context.phase,
        chunkIndex: context.chunkIndex,
        candidates: candidates.map(candidate => ({

      window.dispatchEvent(event);

    for (const candidate of candidates) {
      if (!manager.trigger(candidate.cardId, tutorialContext({
        source: tutorialPacing.firstAppearanceEvent,
        organismType: candidate.type || null,
        organismSource: candidate.source,

      if (candidate.type) state.discoveredMicrobes.add(candidate.type);
      return true;

    return false;

  function triggerStateTransitions() {

    const transitions = [
      ['action-exudate', current.exudate && !previousConditions.exudate],
      ['action-inoculation', current.inoculation && !previousConditions.inoculation],
      ['power-double-jump', current.doubleJump && !previousConditions.doubleJump],
      ['power-dash', current.dash && !previousConditions.dash],
      ['power-pulse', current.pulse && !previousConditions.pulse],
    ];

    for (const [id, active] of transitions) {
      if (active && manager.trigger(id, tutorialContext())) return true;

    const now = performance.now();
    if (now < resumeDelayUntil || now - lastCheckAt < 140) return;
    lastCheckAt = now;

    // Entre todos os organismos próximos, abre primeiro o mais perto de Miguelito.
    if (triggerNearestOrganism()) return;
    if (triggerStateTransitions()) return;

    const eggMasses = sim.meloidogyneLifecycle.eggMasses || [];
    const nearbyEggMass = eggMasses.find(mass => (
      mass.eggs > 0 && nearPoint(mass.x, mass.y, TUTORIAL_PROXIMITY.structure)
    ));
    if (trigger('structure-egg-mass', nearbyEggMass)) return;

    const galls = sim.meloidogyneLifecycle.galls || [];
    const nearbyGall = galls.find(gall => (
      gall.progress >= .12
      && nearPoint(gall.x, gall.platform?.y || gall.y, TUTORIAL_PROXIMITY.structure)
    ));
    if (trigger('structure-gall', nearbyGall)) return;

    const nodules = state.level.rhizobiumNodules || [];
    const nearbyNodule = nodules.find(site => (
      site.compatible && nearPoint(site.x, site.surfaceY, TUTORIAL_PROXIMITY.rootProcess)
    ));
    if (trigger('structure-nodule', nearbyNodule)) return;

    const activeFixation = nodules.find(site => (
      site.fixationRate > .05 && nearPoint(site.x, site.surfaceY, TUTORIAL_PROXIMITY.rootProcess)
    ));
    if (trigger('process-fbn', activeFixation)) return;

    const nearbyBiofilm = (state.level.biofilms || []).find(film => (
      film.functional
      && nearPoint(film.x, film.platform?.y ?? film.y, TUTORIAL_PROXIMITY.structure)
    ));
    if (trigger('structure-biofilm', nearbyBiofilm)) return;

    const pseudomonasKnown = state.discoveredMicrobes.has('pseudomonas');
    const siderophoreActive = sim.pseudomonasSiderophores.freeCount > 0
      || sim.pseudomonasSiderophores.loadedCount > 0
      || sim.pseudomonasSiderophores.ironRecovered > 0;
    const nearbyPseudomonas = (sim.ecology.agents || []).some(agent => (
      agent.type === 'pseudomonas'
      && nearPoint(agent.x, agent.y, TUTORIAL_PROXIMITY.organism)
    ));
    if (trigger('process-siderophore', pseudomonasKnown && siderophoreActive && nearbyPseudomonas)) return;

    const nearbyArbuscule = (state.level.mycorrhizaArbuscules || []).find(arbuscule => (
      arbuscule.maturity > .08
      && nearPoint(arbuscule.x, arbuscule.y, TUTORIAL_PROXIMITY.structure)
    ));
    if (trigger('structure-arbuscule', nearbyArbuscule)) return;

    const mycorrhizaPath = (state.level.platforms || []).find(platform => (
      platform.mycorrhizaStructure && nearPlatform(platform, TUTORIAL_PROXIMITY.rootProcess)
    ));
    if (trigger('structure-mycorrhiza-path', mycorrhizaPath)) return;

    const lateralRoot = (state.level.azospirillumRoots || []).find(root => (
      root.visibleProgress > .06
      && (
        nearPoint(root.startX, root.startY, TUTORIAL_PROXIMITY.rootProcess)
        || nearPoint(root.endX, root.endY, TUTORIAL_PROXIMITY.rootProcess)
      )
    ));
    if (trigger('structure-lateral-root', lateralRoot)) return;

    const roots = (state.level.platforms || []).filter(root => (
      root.type === 'root'
      && !root.final
      && !root.recovery
      && !root.mycorrhizaStructure
      && nearPlatform(root, TUTORIAL_PROXIMITY.rootProcess)
    ));
    const changedRoot = roots.find(root => root.rootState && root.rootState !== 'healthy');
    if (trigger('process-root-health', changedRoot)) return;

    const recoveringRoot = roots.find(root => root.healthTrend > 0 && root.recoveryPulse > .2);
    if (trigger('process-root-recovery', recoveringRoot)) return;

    const collapsedRoot = roots.find(root => root.rootState === 'collapse' || root.unstable);
    if (trigger('process-root-collapse', collapsedRoot)) return;

    const nearbyTargetedRhizoctonia = (state.level.enemies || []).some(enemy => (
      enemy.trichodermaRhizoTargeted
      && nearPoint(enemy.x + enemy.w / 2, enemy.y + enemy.h / 2, TUTORIAL_PROXIMITY.structure)
    ));
    const nearbyOpportunisticFungus = (sim.ecology.agents || []).some(agent => (
      agent.type === 'oportunista'
      && nearPoint(agent.x, agent.y, TUTORIAL_PROXIMITY.structure)
    ));
    const mycoparasitismActive = (
      trichodermaRhizoctoniaControl.activeAttackCount > 0 && nearbyTargetedRhizoctonia
    ) || (sim.trichoderma.attackCount > 0 && nearbyOpportunisticFungus);
    trigger('process-mycoparasitism', mycoparasitismActive);
  }

  function showWelcome() {
    manager.trigger('system-welcome', {
      tutorialMode: 'guided',
      worldX: playerPoint().x,
      visibleWorldWidth: W / Math.max(0.1, state.cameraZoom || 1),
      nowSeconds: performance.now() / 1000,
      affectsPacing: false,
    });
  }

  function rearm() {
    // Fotografa o estado atual: poderes já ativos não reaparecem imediatamente.
    previousConditions = conditionSnapshot();
    resumeDelayUntil = performance.now() + 700;
    lastCheckAt = -Infinity;
  }

  function diagnostics() {
    const player = playerPoint();
    const chunkIndex = currentChunkIndex();
    const phase = Number.isInteger(state.campaign?.phase) ? state.campaign.phase : 1;
    const nearbyAgents = (sim.ecology.agents || [])
      .map(agent => ({
        type: agent.type,
        distance: Math.round(Math.hypot(agent.x - player.x, agent.y - player.y)),
      }))
      .filter(agent => agent.distance <= 500)
      .sort((a, b) => a.distance - b.distance);

    return {
      version: TUTORIAL_RUNTIME_VERSION,
      gameState: state.gameState,
      tutorialOpen: manager.isOpen,
      phase,
      chunkIndex,
      tutorialMode: getTutorialModeAt(phase, chunkIndex),
      conditions: conditionSnapshot(),
      discovered: [...state.discoveredMicrobes],
      nearbyAgents,
      closestCandidate: organismCandidates()[0] || null,
      lastUnexpectedFirstAppearance,
      lastSimultaneousFirstEncounters,
    };
  }
