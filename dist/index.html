<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#071820">
  <title>Beans - Protótipo Procedural</title>
  <style>
    :root {
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #071218;
      color: #fff;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: hidden;
      overscroll-behavior: none;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    body { display: flex; align-items: center; justify-content: center; }
    canvas {
      display: block;
      background: #222;
      image-rendering: pixelated;
      width: 100vw;
      height: 100dvh;
      object-fit: contain;
      touch-action: none;
    }
    #debug {
      position: absolute;
      z-index: 20;
      bottom: calc(10px + var(--safe-bottom));
      right: calc(10px + var(--safe-right));
      background: rgba(0,0,0,.62);
      padding: 6px 10px;
      pointer-events: none;
      font: 11px/1.4 ui-monospace, SFMono-Regular, Consolas, monospace;
      max-width: min(360px, 46vw);
      max-height: 46vh;
      overflow: hidden;
      border-radius: 8px;
      transition: opacity .25s;
      white-space: pre-line;
      border: 1px solid rgba(140,230,220,.2);
    }
    #debug.hidden { opacity: 0; }
    #toast {
      position: absolute;
      z-index: 30;
      top: calc(42px + var(--safe-top));
      left: 50%;
      transform: translateX(-50%);
      background: rgba(2,15,21,.88);
      padding: 8px 16px;
      border-radius: 10px;
      font-size: 13px;
      line-height: 1.3;
      pointer-events: none;
      text-align: center;
      width: max-content;
      max-width: min(620px, calc(100vw - 32px));
      opacity: 0;
      transition: opacity .3s;
      border: 1px solid rgba(108,231,223,.35);
      box-shadow: 0 8px 24px rgba(0,0,0,.24);
    }
    #toast.show { opacity: 1; }
    #mission {
      position: absolute;
      z-index: 25;
      top: calc(8px + var(--safe-top));
      left: calc(10px + var(--safe-left));
      max-width: 46vw;
      pointer-events: none;
      padding: 4px 10px 4px 0;
      font-size: 12px;
      color: rgba(255,255,255,.8);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-shadow: 0 2px 6px rgba(0,0,0,.85);
    }

    /* Recursos: um chip por coisa, com o numero grande e o rotulo pequeno. A
       barra antiga era uma frase unica com ate 12 trechos colados por "|" —
       pontos, solo, esperanca, infeccao, contagem de ataques de Trichoderma —
       tudo no mesmo tamanho e na mesma cor. Sem hierarquia, nada se destacava.
       A telemetria saiu daqui: lugar dela e o console do Phase Lab. */
    #hud-stock {
      position: absolute;
      z-index: 25;
      top: calc(8px + var(--safe-top));
      right: calc(10px + var(--safe-right));
      display: flex;
      gap: 6px;
      align-items: stretch;
      pointer-events: none;
    }
    .stock-chip {
      display: flex;
      gap: 7px;
      align-items: center;
      min-width: 62px;
      padding: 5px 10px;
      border: 1px solid rgba(126,214,205,.3);
      border-radius: 11px;
      background: rgba(6,26,32,.82);
      box-shadow: 0 4px 14px rgba(0,0,0,.34);
      backdrop-filter: blur(5px);
    }
    .stock-chip .icon { width: 20px; height: 20px; flex: none; }
    .stock-chip .read { display: grid; line-height: 1; }
    .stock-chip .label {
      font-size: 8.5px;
      font-weight: 800;
      letter-spacing: .09em;
      text-transform: uppercase;
      color: rgba(196,232,226,.66);
    }
    .stock-chip .value {
      margin-top: 2px;
      font-size: 16px;
      font-weight: 800;
      color: #eafffb;
      font-variant-numeric: tabular-nums;
    }
    /* A mao e o unico chip que responde a uma tecla, entao e o unico com
       destaque e com a tecla desenhada. Antes era o rabo de uma frase. */
    .stock-chip.hand {
      border-color: rgba(122,232,214,.72);
      background: rgba(10,45,48,.9);
      box-shadow: 0 4px 16px rgba(0,0,0,.4), 0 0 18px rgba(112,229,214,.16);
    }
    .stock-chip.hand .value { color: #9dfff0; }
    .stock-chip .key {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 17px;
      height: 17px;
      margin-left: 2px;
      padding: 0 4px;
      border: 1px solid rgba(160,255,240,.6);
      border-radius: 5px;
      background: rgba(2,20,24,.9);
      font-size: 9px;
      font-weight: 900;
      color: #b6fff2;
    }
    .stock-chip .swap { font-size: 8.5px; font-weight: 700; color: rgba(150,230,220,.72); }

    /* Alertas: so existem quando ha problema, e ai gritam. Antes viravam mais
       um trecho igual aos outros no meio da frase. */
    #hud-alerts {
      position: absolute;
      z-index: 25;
      top: calc(52px + var(--safe-top));
      right: calc(10px + var(--safe-right));
      display: flex;
      flex-direction: column;
      gap: 4px;
      align-items: flex-end;
      max-width: 44vw;
      pointer-events: none;
    }
    .hud-alert {
      display: flex;
      gap: 6px;
      align-items: center;
      padding: 3px 9px;
      border-radius: 7px;
      border: 1px solid rgba(255,176,102,.52);
      background: rgba(58,29,6,.86);
      color: #ffd9ab;
      font-size: 10.5px;
      font-weight: 800;
      white-space: nowrap;
    }
    .hud-alert.grave {
      border-color: rgba(255,124,142,.6);
      background: rgba(60,10,22,.88);
      color: #ffcdd6;
    }

    #touch-controls, #mobile-tools { display: none; }

    .touch-device #debug {
      display: none;
      bottom: calc(94px + var(--safe-bottom));
      right: calc(8px + var(--safe-right));
      left: calc(8px + var(--safe-left));
      max-width: none;
      max-height: 34vh;
      padding: 8px 10px;
      font-size: 9px;
      line-height: 1.26;
      background: rgba(0,7,11,.88);
    }
    .touch-device #debug.mobile-visible { display: block; opacity: 1; }
    .touch-device #toast {
      top: calc(44px + var(--safe-top));
      padding: 6px 11px;
      width: auto;
      max-width: min(76vw, 520px);
      max-height: 3.25em;
      font-size: clamp(10px, 2.25vw, 12px);
      line-height: 1.25;
      overflow: hidden;
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 2;
    }
    .touch-device #mission {
      left: calc(7px + var(--safe-left));
      max-width: 43vw;
      font-size: clamp(9px, 2vw, 11px);
    }
    .touch-device #hud-stock { right: calc(7px + var(--safe-right)); gap: 4px; }
    .touch-device .stock-chip { min-width: 0; gap: 5px; padding: 4px 7px; }
    .touch-device .stock-chip .icon { width: 16px; height: 16px; }
    .touch-device .stock-chip .value { font-size: 13px; }
    .touch-device .stock-chip .label { font-size: 7.5px; }
    .touch-device #hud-alerts { top: calc(44px + var(--safe-top)); right: calc(7px + var(--safe-right)); }
    .touch-device .hud-alert { font-size: 9px; padding: 2px 7px; }

    /* Paisagem de celular: e o modo de jogo, e o que falta e altura. Os chips
       perdem o rotulo e ficam so icone + numero. */
    @media (max-height: 560px) and (orientation: landscape) {
      .stock-chip { min-width: 0; padding: 3px 7px; gap: 5px; }
      .stock-chip .label { display: none; }
      .stock-chip .value { margin-top: 0; font-size: 13px; }
      .stock-chip .icon { width: 16px; height: 16px; }
      #hud-alerts { top: calc(42px + var(--safe-top)); }
    }
    .touch-device #touch-controls {
      position: fixed;
      z-index: 60;
      inset: 0;
      display: block;
      pointer-events: none;
    }
    .touch-cluster {
      position: absolute;
      bottom: calc(10px + var(--safe-bottom));
      display: flex;
      align-items: flex-end;
      gap: clamp(8px, 1.8vw, 14px);
      pointer-events: none;
    }
    .touch-cluster.move { left: calc(10px + var(--safe-left)); }
    .touch-cluster.actions {
      right: calc(10px + var(--safe-right));
      align-items: center;
    }
    .touch-key, .mobile-tool {
      appearance: none;
      border: 1px solid rgba(205,255,245,.42);
      color: #effff9;
      background: rgba(5,31,38,.58);
      box-shadow: 0 5px 18px rgba(0,0,0,.25), inset 0 0 18px rgba(112,229,214,.09);
      backdrop-filter: blur(5px);
      touch-action: none;
      pointer-events: auto;
      font-family: inherit;
      font-weight: 800;
      text-shadow: 0 1px 3px rgba(0,0,0,.6);
    }
    .touch-key {
      width: clamp(54px, 10vw, 76px);
      height: clamp(54px, 10vw, 76px);
      border-radius: 50%;
      font-size: clamp(22px, 4.6vw, 34px);
    }
    .touch-key.primary {
      width: clamp(64px, 12vw, 88px);
      height: clamp(64px, 12vw, 88px);
      background: rgba(67,139,139,.68);
      border-color: rgba(220,255,247,.7);
    }
    .touch-key.small {
      width: clamp(48px, 8.3vw, 64px);
      height: clamp(48px, 8.3vw, 64px);
      font-size: clamp(12px, 2.3vw, 17px);
      letter-spacing: -.2px;
    }
    .touch-key.pressed, .mobile-tool:active {
      transform: scale(.92);
      background: rgba(112,229,214,.82);
      color: #052128;
      box-shadow: 0 0 24px rgba(112,229,214,.5);
    }
    .action-stack { display: grid; gap: 7px; pointer-events: none; }
    .touch-label {
      display: block;
      font-size: .43em;
      line-height: 1;
      margin-top: 2px;
      opacity: .8;
    }
    .touch-device #mobile-tools {
      position: fixed;
      z-index: 70;
      top: calc(42px + var(--safe-top));
      right: calc(7px + var(--safe-right));
      display: flex;
      gap: 5px;
    }
    .mobile-tool {
      width: 34px;
      height: 30px;
      border-radius: 9px;
      padding: 0;
      font-size: 15px;
    }
    .mobile-tool.zoom-step { width: 30px; }
    .mobile-tool.zoom-value {
      width: 50px;
      font-size: 10px;
      letter-spacing: -.2px;
    }
    .mobile-tool.active, .mobile-tool[aria-pressed="true"] {
      background: rgba(112,229,214,.74);
      color: #052128;
    }

    @media (pointer: coarse) and (orientation: portrait) {
      .touch-device #toast { top: calc(70px + var(--safe-top)); max-width: 88vw; }
      .touch-device #mission { max-width: 58vw; }
      /* Retrato e estreito: os chips passam para baixo do objetivo em vez de
         disputarem a mesma linha com ele. */
      .touch-device #hud-stock {
        top: calc(32px + var(--safe-top));
        left: calc(7px + var(--safe-left));
        right: auto;
        flex-wrap: wrap;
        max-width: 84vw;
      }
      .touch-device #hud-alerts {
        top: auto;
        bottom: calc(96px + var(--safe-bottom));
        right: calc(7px + var(--safe-right));
        max-width: 62vw;
      }
      .touch-device #mobile-tools { top: calc(70px + var(--safe-top)); }
      .touch-cluster.actions { gap: 6px; }
      .touch-key { width: 58px; height: 58px; }
      .touch-key.primary { width: 68px; height: 68px; }
      .touch-key.small { width: 48px; height: 48px; }
    }

    @media (max-height: 480px) and (pointer: coarse) {
      .touch-key { width: 52px; height: 52px; font-size: 23px; }
      .touch-key.primary { width: 62px; height: 62px; }
      .touch-key.small { width: 44px; height: 44px; font-size: 12px; }
      .touch-cluster { bottom: calc(5px + var(--safe-bottom)); }
      .touch-device #toast { top: calc(38px + var(--safe-top)); }
    }
  </style>
<style data-tutorial-styles>
#tutorial-library-button {
  position: fixed;
  z-index: 82;
  top: calc(44px + var(--safe-top));
  right: calc(10px + var(--safe-right));
  display: inline-flex;
  align-items: center;
  gap: 7px;
  min-height: 34px;
  padding: 0 12px;
  border: 1px solid rgba(196,255,244,.42);
  border-radius: 10px;
  color: #effff9;
  background: rgba(5,31,38,.7);
  box-shadow: 0 5px 18px rgba(0,0,0,.28), inset 0 0 18px rgba(112,229,214,.08);
  backdrop-filter: blur(7px);
  font: 800 12px/1 Inter,system-ui,sans-serif;
  cursor: pointer;
  touch-action: manipulation;
}
#tutorial-library-button:hover,
#tutorial-library-button:focus-visible {
  background: rgba(69,151,148,.84);
  outline: 2px solid rgba(220,255,247,.76);
  outline-offset: 2px;
}
.touch-device #tutorial-library-button { display: none; }

.tutorial-overlay {
  position: fixed;
  z-index: 220;
  inset: 0;
  display: grid;
  place-items: center;
  padding: calc(18px + var(--safe-top)) calc(18px + var(--safe-right)) calc(18px + var(--safe-bottom)) calc(18px + var(--safe-left));
  touch-action: none;
}
.tutorial-overlay[hidden] { display: none; }
.tutorial-backdrop {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at 50% 42%, rgba(50,167,159,.2), transparent 38%),
    rgba(1,8,12,.84);
  backdrop-filter: blur(7px) saturate(.72);
}
.tutorial-panel {
  --tutorial-accent: #70e5d6;
  position: relative;
  z-index: 1;
  width: min(920px, 96vw);
  max-height: min(90dvh, 760px);
  overflow: hidden;
  border: 1px solid color-mix(in srgb, var(--tutorial-accent) 68%, transparent);
  border-radius: 22px;
  color: #effff9;
  background:
    linear-gradient(135deg, rgba(10,43,49,.97), rgba(3,17,25,.985) 56%, rgba(7,30,37,.98)),
    #071b22;
  box-shadow:
    0 30px 80px rgba(0,0,0,.62),
    0 0 42px color-mix(in srgb, var(--tutorial-accent) 18%, transparent),
    inset 0 0 42px rgba(104,231,220,.05);
  isolation: isolate;
}
.tutorial-panel::before,
.tutorial-panel::after {
  content: '';
  position: absolute;
  pointer-events: none;
}
.tutorial-panel::before {
  inset: 10px;
  border: 1px solid color-mix(in srgb, var(--tutorial-accent) 24%, transparent);
  border-radius: 15px;
}
.tutorial-panel::after {
  width: 220px;
  height: 220px;
  right: -95px;
  top: -110px;
  border-radius: 50%;
  background: color-mix(in srgb, var(--tutorial-accent) 18%, transparent);
  filter: blur(28px);
}
.tutorial-scanlines {
  position: absolute;
  z-index: -1;
  inset: 0;
  opacity: .16;
  pointer-events: none;
  background: repeating-linear-gradient(
    to bottom,
    transparent 0,
    transparent 4px,
    rgba(211,255,247,.13) 5px,
    transparent 6px
  );
  animation: tutorial-scan 10s linear infinite;
}
@keyframes tutorial-scan {
  from { transform: translateY(-16px); }
  to { transform: translateY(16px); }
}
.tutorial-close {
  position: absolute;
  z-index: 5;
  top: 14px;
  right: 14px;
  width: 38px;
  height: 38px;
  border: 1px solid rgba(226,255,250,.36);
  border-radius: 50%;
  color: #f1fffb;
  background: rgba(3,20,27,.78);
  font: 400 27px/1 system-ui,sans-serif;
  cursor: pointer;
  touch-action: manipulation;
}
.tutorial-close:hover,
.tutorial-close:focus-visible {
  background: color-mix(in srgb, var(--tutorial-accent) 42%, rgba(3,20,27,.9));
  outline: 2px solid var(--tutorial-accent);
  outline-offset: 2px;
}
.tutorial-card-view,
.tutorial-library-view {
  position: relative;
  max-height: min(90dvh, 760px);
  scrollbar-color: color-mix(in srgb, var(--tutorial-accent) 55%, transparent) rgba(0,0,0,.2);
}
.tutorial-library-view { overflow: auto; }
/* O cartao rola por dentro, nao por fora. Quando a view inteira rolava, em
   paisagem no celular o cabecalho saia da tela e o jogador perdia justamente o
   nome do organismo que o cartao esta ensinando. Cabecalho e rodape ficam
   presos; so o miolo rola. */
.tutorial-card-view {
  display: flex;
  flex-direction: column;
  overflow: hidden;
  padding: 28px 32px 24px;
}
.tutorial-header { flex: none; padding-right: 46px; }
.tutorial-footer { flex: none; }
.tutorial-heading-meta {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 8px;
}
.tutorial-category,
.tutorial-new-badge {
  display: inline-flex;
  align-items: center;
  min-height: 24px;
  padding: 0 10px;
  border-radius: 999px;
  font-size: 10px;
  font-weight: 900;
  letter-spacing: .1em;
  text-transform: uppercase;
}
.tutorial-category {
  color: color-mix(in srgb, var(--tutorial-accent) 86%, white);
  border: 1px solid color-mix(in srgb, var(--tutorial-accent) 45%, transparent);
  background: color-mix(in srgb, var(--tutorial-accent) 11%, transparent);
}
.tutorial-new-badge {
  color: #08191b;
  background: var(--tutorial-accent);
  box-shadow: 0 0 20px color-mix(in srgb, var(--tutorial-accent) 32%, transparent);
}
.tutorial-title,
.tutorial-library-title {
  margin: 0;
  color: #f4fffc;
  font-size: clamp(26px, 4vw, 44px);
  line-height: 1.04;
  letter-spacing: -.035em;
}
.tutorial-subtitle,
.tutorial-library-description {
  margin: 7px 0 0;
  color: rgba(231,255,249,.72);
  font-size: clamp(13px, 1.8vw, 17px);
  line-height: 1.4;
}
.tutorial-content {
  flex: 1;
  min-height: 0;
  overflow: auto;
  display: grid;
  grid-template-columns: minmax(215px, 280px) minmax(0, 1fr);

}
.tutorial-visual {

  justify-content: center;
  overflow: hidden;
  border: 1px solid color-mix(in srgb, var(--tutorial-accent) 34%, transparent);

  background:

    linear-gradient(180deg, rgba(3,25,31,.62), rgba(2,13,20,.78));
}
.tutorial-visual::after {
  content: '';
  position: absolute;
  left: 12%;
  right: 12%;
  bottom: 103px;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--tutorial-accent), transparent);
  box-shadow: 0 0 18px var(--tutorial-accent);
}
.tutorial-hologram-ring {
  position: absolute;
  left: 50%;
  top: 38%;
  border: 1px solid color-mix(in srgb, var(--tutorial-accent) 65%, transparent);
  border-radius: 50%;

function buildPhaseReport() {
  const scoredRoots = (sim.state.level.platforms || []).filter(root => root.type === 'root' && !root.final && !root.recovery && !root.mycorrhizaStructure);
  const rootHealth = scoredRoots.length
    ? scoredRoots.reduce((sum, root) => sum + clamp(root.rootHealth ?? 1, 0, 1), 0) / scoredRoots.length
    : 1;
  const infestation = clamp((sim.meloidogyneLifecycle.infestationPercent || 0) / 100, 0, 1);
  const fixation = Math.max(0, (sim.state.level.rhizobiumNodules || []).reduce((sum, site) => sum + (site.fixationRate || 0), 0));

  const score = Math.round(
    rootHealth * 40
    + (1 - infestation) * 20
    + Math.min(1, fixation / 10) * 15
    + protection * 15
    + vascularTransport * 10,
  );
  return {
    phase: campaign.phase,
    title: profile.title,
    theme: profile.theme,
    rootHealth: Math.round(rootHealth * 100),
    infestation: Math.round(infestation * 100),
    fixation: Number(fixation.toFixed(1)),
    protectedRoots: sim.bacillusBioprotection.protectedRootCount || 0,
    vascularTransport: Math.round(vascularTransport * 100),

    if (chunk.allyId) {

      let desc = '';
      let name = '';
      if (chunk.allyId === 'azo') {

        desc = 'Azospirillum está associado ao desenvolvimento radicular. No jogo, ele libera o Impulso Radicular: pressione salto novamente no ar.';
      }
      if (chunk.allyId === 'myco') {
        name = 'Mira, a Micorriza';
        desc = 'As hifas ampliam o volume de solo explorado e ajudam a transportar fósforo e água até a raiz. No jogo, pressione Shift para o Impulso de Hifa.';
      }
      if (chunk.allyId === 'phos-power') {
        name = 'Pulso de solubilização';
        desc = 'Selecione Solubilização P, segure E perto da cepa de Bacillus e solte para disparar no depósito.';
      }
      allies.push({
        id: chunk.allyId,
        x: nextPlatform.x + nextPlatform.w / 2,
        y: nextPlatform.y - 40,
        r: 28,
        taken: false,
        name,
        desc,
        logicIndex: i,
      });
    }

    if (chunk.isPathogenDebut && chunk.pathogenType === 'rhizoctonia') {
      nextPlatform.w = Math.max(nextPlatform.w, 150);
    }

    if (chunk.hasEnemy && nextPlatform.w > 130) {
      const ew = 42;
      const eh = 38;
      enemies.push({
        x: nextPlatform.x + nextPlatform.w / 2,
        y: nextPlatform.y - eh - 10,
        w: ew,
        h: eh,
        vx: 45 + rnd() * 20,
        left: nextPlatform.x + 20,
        right: nextPlatform.x + nextPlatform.w - ew - 20,
        alive: true,
        type: chunk.pathogenType,
        logicIndex: i,
        debut: chunk.isPathogenDebut,
      });
    }

    const recoveryRoots = createRecoveryRoots(prevPlatform, nextPlatform, chunk, rnd, i);
    platforms.push(...recoveryRoots, nextPlatform);
    debugInfo.push({
      index: i,
      logic: chunk,
      primitive: prim.id,
      repairs: attempts,
      accepted,
      recoveryRoots: recoveryRoots.length,
      gap: Math.round(nextPlatform.x - (prevPlatform.x + prevPlatform.w)),
    });
    prevPlatform = nextPlatform;
  }

  const finalWidth = prevPlatform.x + prevPlatform.w + 1000;
  const hazardWidth = 500;
  const numHazards = Math.ceil(finalWidth / hazardWidth);
  for (let i = 0; i < numHazards; i++) {
    hazards.push({ x: i * hazardWidth, y: 674, w: hazardWidth, h: 46 });
  }

  const rootSpacing = 70;
  const numRoots = Math.ceil(finalWidth / rootSpacing);
  const roots = Array.from({ length: numRoots }, (_, i) => ({
    x: i * rootSpacing + rnd() * 60,
    y: 140 + rnd() * 500,
    len: 60 + rnd() * 190,
    ang: -.7 + rnd() * 1.4,
    thick: 1 + rnd() * 3,
    layer: rnd(),
  }));

  const numSpores = Math.min(400, Math.ceil(finalWidth / 25));
  const spores = Array.from({ length: numSpores }, () => ({
    x: rnd() * finalWidth,
    y: 90 + rnd() * 570,
    r: .7 + rnd() * 2.2,
    s: .2 + rnd() * .7,
    p: rnd() * TAU,
  }));

  const lastPlat = platforms[platforms.length - 1];
  const endX = lastPlat.x + lastPlat.w + 500;
  const exudates = [];
  for (let i = 2; i < platforms.length; i++) {
    const plat = platforms[i];
    if (plat.recovery || plat.w < 75 || rnd() >= .35) continue;
    exudates.push({
      logicIndex: plat.logicIndex,
      x: plat.x + 30 + rnd() * Math.max(1, plat.w - 60),
      y: plat.y - 25 - rnd() * 15,
      taken: false,
    });
  }

  return {
    platforms,
    hazards,
    crystals,
    enemies,
    exudates,
    allies,
    checkpoints,
    roots,
    spores,
    particles: [],
    pulses: [],
    debugInfo,
    primitives,
    endX,
    cameraMaxX: Math.max(0, endX - 1000),
  };
}

function createRandom(seedString) {
  let seed = 0;
  for (let i = 0; i < seedString.length; i++) {
    seed = Math.imul(31, seed) + seedString.charCodeAt(i) | 0;
  }

  // Mulberry32
  return function() {
    let t = seed += 0x6D2B79F5;
    t = Math.imul(t ^ t >>> 15, t | 1);
    t ^= t + Math.imul(t ^ t >>> 7, t | 61);
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  }
}
Object.assign(__exports, { createRandom });
},

    // somente N+1 em diante pode usá-lo. Poderes anteriores dependem do estado

    const availableAbilities = [...MOVEMENT_FEATURES].filter(feature => availableUnlocks[feature]);
    const practiceFeature = getRequiredPracticeAbilityAt(profile.phase, i);
    const isSkillNode = Boolean(practiceFeature && availableUnlocks[practiceFeature]);

      ? practiceFeature

    const eligibleEnemyChunk = !event && !isCheckpoint && !isSkillNode && i > 4;

const campaignManifest = Object.freeze(phases);

const phaseManifestOverrides = new Map();

function cloneManifestValue(value) {
  return JSON.parse(JSON.stringify(value));
}

function getActiveCampaignManifest() {
  return campaignManifest.map(entry => phaseManifestOverrides.get(entry.phase) || entry);
}

function setPhaseManifestOverride(phaseManifest) {
  if (!phaseManifest || !Number.isInteger(phaseManifest.phase)) {
    throw new TypeError('Override de fase precisa informar um numero de fase inteiro.');
  }
  if (!campaignManifest.some(entry => entry.phase === phaseManifest.phase)) {
    throw new RangeError(`Fase inexistente no manifesto: ${phaseManifest.phase}.`);
  }
  const candidate = cloneManifestValue(phaseManifest);
  const manifest = campaignManifest.map(entry => entry.phase === candidate.phase ? candidate : entry);
  const errors = validateCampaignManifest({ manifest });
  if (errors.length) {
    throw new Error(`Override de fase invalido:\n${errors.join('\n')}`);
  }
  phaseManifestOverrides.set(candidate.phase, candidate);
  return candidate;
}

function clearPhaseManifestOverride(phase = null) {
  if (phase === null) phaseManifestOverrides.clear();
  else phaseManifestOverrides.delete(phase);
}

function getPhaseManifest(phase) {
  return phaseManifestOverrides.get(phase)
    || campaignManifest.find(entry => entry.phase === phase)
    || null;
}

function getSegmentAt(phase, chunkIndex) {
  return getPhaseManifest(phase)?.segments.find(s => chunkIndex >= s.from && chunkIndex <= s.to) || null;
}

function getTutorialModeAt(phase, chunkIndex) {
  return getSegmentAt(phase, chunkIndex)?.tutorialMode || 'disabled';
}

function getPresentationById(id) {
  for (const phase of getActiveCampaignManifest()) {
    const found = phase.presentations.find(p => p.id === id);
    if (found) return found;
  }
  return null;
}

function getPresentationForTrigger(triggerId) {
  for (const phase of getActiveCampaignManifest()) {
    const found = phase.presentations.find(p => p.triggerIds.includes(triggerId));
    if (found) return found;
  }
  return null;
}

function roamingTypesOf(presentation) {
  if (presentation.roamingType) return [presentation.roamingType];
  if (Array.isArray(presentation.roamingTypes)) return presentation.roamingTypes.slice();
  return [];
}

function getRoamingDebutsAt(phase, chunkIndex) {
  const entry = getPhaseManifest(phase);
  if (!entry) return [];
  const allowed = Array.isArray(entry.phaseLab?.allowedOrganisms)
    ? new Set(entry.phaseLab.allowedOrganisms)
    : null;
  return entry.presentations
    .filter(presentation => presentation.debutChunk === chunkIndex)
    .flatMap(presentation => roamingTypesOf(presentation)
      .filter(type => !allowed || allowed.has(type))
      .map(type => ({
      type,
      cardId: presentation.cardId,
      presentationId: presentation.id,
      debutZoneId: presentation.debutZoneId || `${presentation.id}-debut`,
      tetherUntilSeen: presentation.tetherUntilSeen === true,
    })));
}

function getProceduralPoolAt(phase, chunkIndex) {
  const current = getPhaseManifest(phase);
  if (Array.isArray(current?.phaseLab?.allowedOrganisms)) {
    return [...new Set(current.phaseLab.allowedOrganisms)]
      .filter(type => ECOLOGY_ROAMING_TYPES.includes(type));
  }
  const types = new Set();
  for (const entry of getActiveCampaignManifest()) {
    if (entry.phase > phase) break;
    for (const presentation of entry.presentations) {
      const roaming = roamingTypesOf(presentation);
      if (!roaming.length) continue;
      if (entry.phase < phase || (entry.phase === phase && chunkIndex >= presentation.poolFromChunk)) {
        roaming.forEach(type => types.add(type));
      }
    }
  }
  return [...types];
}

function getPathogensAt(phase, chunkIndex) {
  const current = getPhaseManifest(phase);
  if (Array.isArray(current?.phaseLab?.allowedPathogens)) {
    return [...new Set(current.phaseLab.allowedPathogens)]
      .filter(type => PATHOGEN_SYSTEMS.includes(type) && !MVP_EXCLUDED_PATHOGENS.includes(type));
  }
  const active = new Set();
  for (const entry of getActiveCampaignManifest()) {
    if (entry.phase > phase) break;
    for (const debut of entry.pathogenDebuts) {
      if (entry.phase < phase || chunkIndex >= debut.fromChunk) active.add(debut.pathogen);
    }
  }
  return [...active];
}

function getPathogenStartChunk(phase, pathogen) {
  const current = getPhaseManifest(phase);
  if (!current || MVP_EXCLUDED_PATHOGENS.includes(pathogen)) return null;
  if (Array.isArray(current.phaseLab?.allowedPathogens)) {
    return current.phaseLab.allowedPathogens.includes(pathogen) ? 0 : null;
  }
  for (const entry of getActiveCampaignManifest()) {
    if (entry.phase > phase) break;
    const debut = entry.pathogenDebuts.find(candidate => candidate.pathogen === pathogen);
    if (!debut) continue;
    return entry.phase < phase ? 0 : debut.fromChunk;
  }
  return null;
}

function getPersistentUnlocksBeforePhase(phase) {
  const active = Object.fromEntries(CAMPAIGN_UNLOCKS.map(flag => [flag, false]));
  for (const entry of getActiveCampaignManifest()) {
    if (entry.phase >= phase) break;
    for (const event of entry.unlockEvents) active[event.feature] = true;
  }
  return active;
}

function getAvailableUnlocksAt(phase, chunkIndex) {
  const active = getPersistentUnlocksBeforePhase(phase);
  const entry = getPhaseManifest(phase);
  if (!entry) return active;
  for (const event of entry.unlockEvents) {
    if (event.eventChunk < chunkIndex) active[event.feature] = true;
  }
  return active;
}

function getRequiredPracticeAbilityAt(phase, chunkIndex) {
  const entry = getPhaseManifest(phase);
  if (!entry) return null;
  for (const event of entry.unlockEvents) {
    const start = event.eventChunk + 1;
    const end = event.eventChunk + Math.max(0, event.practiceWindowChunks || 0);
    if (chunkIndex >= start && chunkIndex <= end) return event.feature;
  }
  return null;
}

function getTetheredDebutsAt(phase, chunkIndex) {
  const entry = getPhaseManifest(phase);
  const segment = getSegmentAt(phase, chunkIndex);
  if (!entry || !segment || segment.kind !== 'fixed') return [];
  return entry.presentations
    .filter(p => p.tetherUntilSeen && segment.debutPresentationIds?.includes(p.id))
    .flatMap(p => roamingTypesOf(p).map(type => ({ type, cardId: p.cardId, presentationId: p.id })));
}

function globalPresentationOrder() {
  return getActiveCampaignManifest()
    .flatMap(entry => entry.presentations.map(p => ({ phase: entry.phase, ...p })))
    .sort((a, b) => a.phase - b.phase || a.debutChunk - b.debutChunk);
}

const VALID_FINAL_TYPES = new Set(['worldState', 'playerUnlock']);
const VALID_OPERATORS = new Set(['===', '!==', '>', '>=', '<', '<=']);
const VALID_COMMANDS = new Set(['doubleJump', 'dash', 'phosphateSolubilization']);

function availableUnlocksIn(manifest, phaseNumber, chunkIndex, knownUnlocks) {
  const active = Object.fromEntries(knownUnlocks.map(flag => [flag, false]));
  for (const phase of manifest) {
    if (phase.phase > phaseNumber) break;
    for (const event of phase.unlockEvents || []) {
      if (phase.phase < phaseNumber || event.eventChunk < chunkIndex) active[event.feature] = true;
    }
  }
  return active;
}

function validateFirstEncounterProximity({
  nearbyOrganismCardIds = [],
  explainedCardIds = [],
} = {}) {
  const explained = new Set(explainedCardIds);
  const unexplained = [...new Set(nearbyOrganismCardIds)]
    .filter(id => id.startsWith('organism-') && !explained.has(id));
  if (unexplained.length <= 1) return [];
  return [`Raio de proximidade contém organismos ainda não explicados simultaneamente: ${unexplained.join(', ')}.`];
}

function validateProgressivePages(presentation, errors) {
  if (presentation.triggerIds.length <= 1) return;
  if (!presentation.suppressIndividualCards) {
    errors.push(`${presentation.id}: cadeia agrupada deve suprimir cartões individuais.`);
  }
  if (presentation.derivedTriggerBehavior !== 'guide-only') {
    errors.push(`${presentation.id}: gatilhos derivados devem atualizar somente o GUIA.`);
  }
  if (!Array.isArray(presentation.pageUnlocks)) {
    errors.push(`${presentation.id}: cadeia agrupada sem pageUnlocks.`);
    return;
  }

  const unlockByTrigger = new Map();
  const coveredPages = new Set();
  for (const unlock of presentation.pageUnlocks) {
    if (!presentation.triggerIds.includes(unlock.triggerId)) {
      errors.push(`${presentation.id}: pageUnlock usa gatilho externo ${unlock.triggerId}.`);
    }
    if (unlockByTrigger.has(unlock.triggerId)) {
      errors.push(`${presentation.id}: pageUnlock duplicado para ${unlock.triggerId}.`);
    }
    unlockByTrigger.set(unlock.triggerId, unlock.pages);
    for (const pageIndex of unlock.pages || []) {
      if (!Number.isInteger(pageIndex) || pageIndex < 0 || pageIndex >= presentation.pages.length) {
        errors.push(`${presentation.id}: índice de página inválido ${pageIndex}.`);
      } else if (coveredPages.has(pageIndex)) {
        errors.push(`${presentation.id}: página ${pageIndex} desbloqueada mais de uma vez.`);
      } else {
        coveredPages.add(pageIndex);
      }
    }
  }

  for (const triggerId of presentation.triggerIds) {
    if (!unlockByTrigger.has(triggerId)) errors.push(`${presentation.id}: gatilho ${triggerId} sem pageUnlock.`);
  }
  presentation.pages.forEach((_, pageIndex) => {
    if (!coveredPages.has(pageIndex)) errors.push(`${presentation.id}: página ${pageIndex} nunca é desbloqueada.`);
  });

  if (presentation.policy === 'mandatory-first-appearance') {
    const firstPages = unlockByTrigger.get(presentation.autoOpenTrigger) || [];
    if (firstPages.length !== 1 || firstPages[0] !== 0) {
      errors.push(`${presentation.id}: primeiro encontro deve desbloquear somente a página 0.`);
    }
  }
}

function validateCampaignManifest({
  manifest = campaignManifest,
  knownCardIds = null,
  knownRoamingTypes = ECOLOGY_ROAMING_TYPES,
  knownPathogens = PATHOGEN_SYSTEMS,
  knownUnlocks = CAMPAIGN_UNLOCKS,
  knownFinalTestKeys = FINAL_TEST_KEYS,
  excludedPathogens = MVP_EXCLUDED_PATHOGENS,
} = {}) {
  const errors = [];
  const phaseIds = new Set();
  const presentationIds = new Set();
  const triggerOwners = new Map();
  const allPresentationIds = new Set(manifest.flatMap(phase => phase.presentations.map(p => p.id)));
  const knownCards = knownCardIds ? new Set(knownCardIds) : null;
  const validateCondition = (condition, scope) => {
    if (!VALID_FINAL_TYPES.has(condition.type)) errors.push(`${scope}: tipo de condiÃ§Ã£o invÃ¡lido.`);
    if (!VALID_OPERATORS.has(condition.operator)) errors.push(`${scope}: operador invÃ¡lido.`);
    if (knownFinalTestKeys[condition.type] && !knownFinalTestKeys[condition.type].includes(condition.key)) {
      errors.push(`${scope}: chave de prova desconhecida ${condition.type}.${condition.key}.`);
    }
  };

  manifest.forEach((phase, expectedPhase) => {
    if (phase.phase !== expectedPhase) errors.push(`Fase fora de ordem: ${phase.phase}; esperado ${expectedPhase}.`);
    if (phaseIds.has(phase.id)) errors.push(`ID de fase duplicado: ${phase.id}.`);
    phaseIds.add(phase.id);
    if (!Array.isArray(phase.newConcepts) || phase.newConcepts.length > 2) {
      errors.push(`${phase.id}: deve ter no máximo dois grupos conceituais.`);
    }
    if (phase.newCommand !== null && !VALID_COMMANDS.has(phase.newCommand)) {
      errors.push(`${phase.id}: comando novo inválido ${phase.newCommand}.`);
    }
    if (!Number.isInteger(phase.totalChunks) || phase.totalChunks <= 0) {
      errors.push(`${phase.id}: totalChunks inválido.`);
      return;
    }

    if (phase.nitrogenRoot) {
      const nitrogenRoot = phase.nitrogenRoot;
      if (typeof nitrogenRoot.enabled !== 'boolean') errors.push(`${phase.id}: nitrogenRoot.enabled invalido.`);
      if (nitrogenRoot.enabled && phase.phase < 2) errors.push(`${phase.id}: nitrogenRoot nao pode existir antes da fase 2.`);
      if (!Number.isInteger(nitrogenRoot.count) || nitrogenRoot.count < 0 || nitrogenRoot.count > 8) {
        errors.push(`${phase.id}: nitrogenRoot.count invalido.`);
      }
      if (!Number.isFinite(nitrogenRoot.requiredFixationRate) || nitrogenRoot.requiredFixationRate <= 0) {
        errors.push(`${phase.id}: nitrogenRoot.requiredFixationRate invalido.`);
      }
      if (!Number.isFinite(nitrogenRoot.growthDurationSeconds) || nitrogenRoot.growthDurationSeconds <= 0) {
        errors.push(`${phase.id}: nitrogenRoot.growthDurationSeconds invalido.`);
      }
    }

    if (phase.phosphateSolubilization) {
      const phosphate = phase.phosphateSolubilization;
      for (const key of Object.keys(PHOSPHATE_SOLUBILIZATION_DEFAULTS)) {
        if (!Number.isFinite(phosphate[key]) || phosphate[key] < 0) {
          errors.push(`${phase.id}: phosphateSolubilization.${key} invalido.`);
        }
      }
      if (phosphate.minimumCharge <= 0 || phosphate.minimumCharge > phosphate.maximumCharge) {
        errors.push(`${phase.id}: faixa de carga da solubilizacao de P invalida.`);
      }
      if (phosphate.minimumTransportedPhosphate <= 0) {
        errors.push(`${phase.id}: phosphateSolubilization.minimumTransportedPhosphate invalido.`);
      }
      // Medido: ate 170px o salto duplo com dash transpoe o deposito e ele deixa
      // de exigir a solubilizacao para seguir.
      if (phosphate.depositHeight < 190) {
        errors.push(`${phase.id}: deposito de ${phosphate.depositHeight}px se transpoe pulando; minimo 190.`);
      }
    }

    if (phase.azospirillumRootLadder) {
      const ladder = phase.azospirillumRootLadder;
      if (typeof ladder.enabled !== 'boolean') errors.push(`${phase.id}: azospirillumRootLadder.enabled invalido.`);
      if (ladder.enabled && phase.phase < 3) errors.push(`${phase.id}: azospirillumRootLadder nao pode existir antes da fase 3.`);
      if (!Number.isInteger(ladder.count) || ladder.count < 0 || ladder.count > 8) {
        errors.push(`${phase.id}: azospirillumRootLadder.count invalido.`);
      }
      if (!Number.isInteger(ladder.stepCount) || ladder.stepCount < 2 || ladder.stepCount > 10) {
        errors.push(`${phase.id}: azospirillumRootLadder.stepCount invalido.`);
      }
      if (!Number.isFinite(ladder.verticalSpacing) || ladder.verticalSpacing < 45 || ladder.verticalSpacing > 110) {
        errors.push(`${phase.id}: azospirillumRootLadder.verticalSpacing invalido.`);
      }
      if (!Number.isFinite(ladder.growthDurationSeconds) || ladder.growthDurationSeconds <= 0) {
        errors.push(`${phase.id}: azospirillumRootLadder.growthDurationSeconds invalido.`);
      }
    }

    if (phase.azospirillumNitrogen) {
      const nitrogen = phase.azospirillumNitrogen;
      if (!Number.isFinite(nitrogen.associativeRate) || nitrogen.associativeRate <= 0 || nitrogen.associativeRate >= .05) {
        errors.push(`${phase.id}: azospirillumNitrogen.associativeRate deve ser positivo e inferior a FBN nodular.`);
      }
      if (!Number.isFinite(nitrogen.rhizobiumSynergyMultiplier) || nitrogen.rhizobiumSynergyMultiplier < 1) {
        errors.push(`${phase.id}: azospirillumNitrogen.rhizobiumSynergyMultiplier invalido.`);
      }
    }

    if (phase.mycorrhizaBridge) {
      const bridge = phase.mycorrhizaBridge;
      if (typeof bridge.horizontalOnly !== 'boolean') {
        errors.push(`${phase.id}: mycorrhizaBridge.horizontalOnly invalido.`);
      }
      for (const key of ['introSourceChunk', 'introTargetChunk']) {
        if (bridge[key] !== undefined && (!Number.isInteger(bridge[key]) || bridge[key] < 0 || bridge[key] >= phase.totalChunks)) {
          errors.push(`${phase.id}: mycorrhizaBridge.${key} invalido.`);
        }
      }
      if (bridge.introGap !== undefined && (!Number.isFinite(bridge.introGap) || bridge.introGap < 58 || bridge.introGap > 340)) {
        errors.push(`${phase.id}: mycorrhizaBridge.introGap invalido.`);
      }
      if (bridge.introVerticalOffset !== undefined
        && (!Number.isFinite(bridge.introVerticalOffset) || Math.abs(bridge.introVerticalOffset) > 68)) {
        errors.push(`${phase.id}: mycorrhizaBridge.introVerticalOffset invalido.`);
      }
    }

    if (phase.opportunisticFungus) {
      for (const key of ['contaminationRate', 'recoveryRate', 'hyphalGrowthRate', 'sporulationRate']) {
        if (!Number.isFinite(phase.opportunisticFungus[key]) || phase.opportunisticFungus[key] < 0) {
          errors.push(`${phase.id}: opportunisticFungus.${key} inválido.`);
        }
      }
      for (const key of ['movementSpeedReduction', 'accelerationReduction', 'jumpImpulseReduction']) {
        const value = phase.opportunisticFungus[key];
        if (!Number.isFinite(value) || value < 0 || value >= 1) {
          errors.push(`${phase.id}: opportunisticFungus.${key} deve estar entre 0 e 1.`);
        }
      }
    }

    if (phase.pseudomonasIronControl) {
      const control = phase.pseudomonasIronControl;
      if (!Number.isFinite(control.minimumIronReserve) || control.minimumIronReserve < 0) {
        errors.push(`${phase.id}: pseudomonasIronControl.minimumIronReserve inválido.`);
      }
      for (const key of ['minimumFungalVigor', 'growthSuppression', 'sporulationSuppression', 'adhesionSuppression']) {
        const value = control[key];
        if (!Number.isFinite(value) || value < 0 || value > 1) {
          errors.push(`${phase.id}: pseudomonasIronControl.${key} deve estar entre 0 e 1.`);
        }
      }
    }

    const coverage = new Array(phase.totalChunks).fill(0);
    const segmentIds = new Set();
    const segmentById = new Map();
    for (const segment of phase.segments) {
      if (segmentIds.has(segment.id)) errors.push(`${phase.id}: segmento duplicado ${segment.id}.`);
      segmentIds.add(segment.id);
      segmentById.set(segment.id, segment);
      if (!SEGMENT_KINDS.includes(segment.kind)) errors.push(`${phase.id}/${segment.id}: kind inválido.`);
      if (!TUTORIAL_MODES.includes(segment.tutorialMode)) errors.push(`${phase.id}/${segment.id}: tutorialMode inválido.`);
      if (segment.from < 0 || segment.to >= phase.totalChunks || segment.from > segment.to) {
        errors.push(`${phase.id}/${segment.id}: intervalo inválido.`); continue;
      }
      if (segment.fixedBlock) {
        if (!['fixed', 'final'].includes(segment.kind)) errors.push(`${phase.id}/${segment.id}: bloco autoral exige kind fixed ou final.`);
        if (!segment.fixedBlock.template) errors.push(`${phase.id}/${segment.id}: bloco autoral sem template.`);
        if (!segment.fixedBlock.objective) errors.push(`${phase.id}/${segment.id}: bloco autoral sem objetivo.`);
        const completion = segment.fixedBlock.completion || [];
        if (segment.fixedBlock.completionRef !== 'finalTest' && completion.length === 0) {
          errors.push(`${phase.id}/${segment.id}: bloco autoral sem condição de conclusão.`);
        }
        for (const condition of completion) validateCondition(condition, `${phase.id}/${segment.id}`);
      }
      for (let i = segment.from; i <= segment.to; i++) coverage[i]++;
    }
    coverage.forEach((count, chunk) => {
      if (count === 0) errors.push(`${phase.id}: chunk ${chunk} sem segmento.`);
      if (count > 1) errors.push(`${phase.id}: chunk ${chunk} sobreposto.`);
    });

    const debutZoneOwners = new Map();
    for (const p of phase.presentations) {
      if (presentationIds.has(p.id)) errors.push(`Apresentação duplicada: ${p.id}.`);
      presentationIds.add(p.id);
      if (!PRESENTATION_POLICIES.includes(p.policy)) errors.push(`${p.id}: policy inválida.`);
      if (!Array.isArray(p.pages) || p.pages.length === 0) errors.push(`${p.id}: apresentação sem páginas.`);
      if (!p.triggerIds.includes(p.autoOpenTrigger)) errors.push(`${p.id}: autoOpenTrigger fora de triggerIds.`);
      if (p.autoOpenTrigger !== p.cardId) errors.push(`${p.id}: autoOpenTrigger deve corresponder ao cardId.`);
      if (knownCards && !knownCards.has(p.cardId)) errors.push(`${p.id}: cardId inexistente ${p.cardId}.`);
      for (const triggerId of p.triggerIds) {
        if (knownCards && !knownCards.has(triggerId)) errors.push(`${p.id}: triggerId inexistente ${triggerId}.`);
        const owner = triggerOwners.get(triggerId);
        if (owner && owner !== p.id) errors.push(`Gatilho ${triggerId} pertence a ${owner} e ${p.id}.`);
        triggerOwners.set(triggerId, p.id);
      }

      const organismTriggers = p.triggerIds.filter(id => id.startsWith('organism-'));
      if (organismTriggers.length > 1) {
        errors.push(`${p.id}: organismos diferentes não podem compartilhar apresentação inicial.`);
      }
      const allowedChain = PRESENTATION_TRIGGER_CHAINS[p.cardId];
      if (p.triggerIds.length > 1 && (!allowedChain || p.triggerIds.some(id => !allowedChain.includes(id)))) {
        errors.push(`${p.id}: cadeia de gatilhos não pertence ao mesmo organismo ou processo.`);
      }
      validateProgressivePages(p, errors);

      const roamingTypes = roamingTypesOf(p);
      if (roamingTypes.length > 1) errors.push(`${p.id}: apresentação não pode agrupar roamingTypes diferentes.`);
      for (const type of roamingTypes) {
        if (!knownRoamingTypes.includes(type)) errors.push(`${p.id}: roaming type desconhecido ${type}.`);
      }
      if (roamingTypes.length) {
        if (!Number.isInteger(p.poolFromChunk)) errors.push(`${p.id}: falta poolFromChunk.`);
        else if (p.poolFromChunk <= p.debutChunk || p.poolFromChunk >= phase.totalChunks) {
          errors.push(`${p.id}: poolFromChunk deve ser posterior à estreia e pertencer à fase.`);
        }
        if (!p.tetherUntilSeen) errors.push(`${p.id}: estreia vagante deve permanecer tethered até ser explicada.`);
      }

      if (p.policy === 'mandatory-first-appearance') {
        if (!p.cardId.startsWith('organism-')) errors.push(`${p.id}: primeira aparição obrigatória exige cardId de organismo.`);
        if (!p.debutZoneId) errors.push(`${p.id}: organismo novo sem debutZoneId.`);
        else if (debutZoneOwners.has(p.debutZoneId)) {
          errors.push(`${phase.id}/${p.debutZoneId}: mais de um organismo novo na mesma zona de estreia.`);
        } else {
          debutZoneOwners.set(p.debutZoneId, p.id);
        }
      }

      const module = segmentById.get(p.moduleId);
      if (!module) errors.push(`${p.id}: moduleId inexistente ${p.moduleId}.`);
      else if (p.debutChunk < module.from || p.debutChunk > module.to) {
        errors.push(`${p.id}: debutChunk fora do módulo ${p.moduleId}.`);
      }
      for (const prerequisiteId of p.prerequisitePresentationIds || []) {
        if (!allPresentationIds.has(prerequisiteId)) errors.push(`${p.id}: pré-requisito inexistente ${prerequisiteId}.`);
      }
    }

    for (const segment of phase.segments) {
      for (const presentationId of segment.debutPresentationIds || []) {
        if (!allPresentationIds.has(presentationId)) {
          errors.push(`${phase.id}/${segment.id}: apresentação de estreia inexistente ${presentationId}.`);
        } else {
          const presentation = phase.presentations.find(p => p.id === presentationId);
          if (!presentation || presentation.moduleId !== segment.id) {
            errors.push(`${phase.id}/${segment.id}: apresentação ${presentationId} pertence a outro módulo ou fase.`);
          }
        }
      }
    }

    for (const event of phase.unlockEvents) {
      if (!knownUnlocks.includes(event.feature)) errors.push(`${phase.id}: unlock desconhecido ${event.feature}.`);
      if (event.eventChunk < 0 || event.eventChunk >= phase.totalChunks) errors.push(`${phase.id}: eventChunk inválido.`);
      if (!phase.segments.some(s => s.id === event.afterModule)) errors.push(`${phase.id}: afterModule inexistente ${event.afterModule}.`);
    }

    for (const debut of phase.pathogenDebuts) {
      if (!knownPathogens.includes(debut.pathogen)) errors.push(`${phase.id}: patógeno desconhecido ${debut.pathogen}.`);
      if (excludedPathogens.includes(debut.pathogen)) errors.push(`${phase.id}: patógeno excluído do MVP ${debut.pathogen}.`);
      if (debut.presentationId && !allPresentationIds.has(debut.presentationId)) {
        errors.push(`${phase.id}: apresentação de patógeno inexistente ${debut.presentationId}.`);
      }
    }

    for (const condition of phase.finalTest.requires) {
      if (!VALID_FINAL_TYPES.has(condition.type)) errors.push(`${phase.id}: tipo de condição inválido.`);
      if (!VALID_OPERATORS.has(condition.operator)) errors.push(`${phase.id}: operador inválido.`);
      if (knownFinalTestKeys[condition.type] && !knownFinalTestKeys[condition.type].includes(condition.key)) {
        errors.push(`${phase.id}: chave de prova desconhecida ${condition.type}.${condition.key}.`);
      }
    }

    for (const segment of phase.segments) {
      for (const mechanic of segment.mechanicsRequired || []) {
        if (!knownUnlocks.includes(mechanic)) continue;
        for (let chunk = segment.from; chunk <= segment.to; chunk++) {
          if (!availableUnlocksIn(manifest, phase.phase, chunk, knownUnlocks)[mechanic]) {
            errors.push(`${phase.id}/${segment.id}: ${mechanic} exigido antes do unlock no chunk ${chunk}.`);
            break;
          }
        }
      }
    }
  });

// Micelio extrarradicular: a trama de hifas que explora o solo e sobre a qual
// os esporos se formam. E o organismo estabelecido; o esporo flutuando acima e
// so o propagulo. Deterministico pela posicao da zona, para nao tremer.
// O micelio e o organismo fixo: escolhe um ponto de raiz uma unica vez e fica
// nele. Antes eu recalculava a cada quadro a partir da zona, e como a zona
// acompanha os esporos o micelio deslizava pela raiz e ate pulava de bloco.
function ensureMyceliumAnchor(state, zone) {
  if (zone.myceliumAnchor?.root && (state.level.platforms || []).includes(zone.myceliumAnchor.root)) {
    return zone.myceliumAnchor;
  }

    root,
    // Guarda a posicao relativa a raiz: se a raiz se mover, o micelio vai junto,
    // que e o correto — ele esta colonizando aquela raiz.
    offset: clamp(zone.x - root.x, 16, Math.max(16, root.w - 16)),
  };
  return zone.myceliumAnchor;
}

function myceliumPoint(anchor) {
  return {
    x: anchor.root.x + anchor.offset,
    y: anchor.root.y - 4,
  };
}

function rootUnderZone(state, zone) {
  let best = null;
  let bestDistance = 240;
  for (const platform of state.level.platforms || []) {
    if (platform.type !== 'root' || platform.mycorrhizaStructure) continue;
    if (zone.x < platform.x - 60 || zone.x > platform.x + platform.w + 60) continue;
    const distance = Math.abs(platform.y - zone.y);
    if (distance < bestDistance) {
      bestDistance = distance;
      best = platform;
    }
  }
  return best;
}

function drawExtraradicalMycelium(ctx, time, anchor) {
  // O micelio nasce da superficie da raiz e se espalha pelo solo em volta. Ele
  // nao flutua no ar junto com os esporos: e a parte fixa do organismo, e os
  // esporos e que se formam acima dele.

  const random = (index) => {

    return value - Math.floor(value);

  ctx.lineCap = 'round';

    // cresce, nunca para dentro do bloco da raiz.
    const spread = -Math.PI * .92 + random(i) * Math.PI * .84;
    const length = 40 + random(i + 40) * 76;
    const bend = (random(i + 80) - .5) * 1.1;
    const breathe = Math.sin(time * .5 + random(i + 120) * TAU) * 2.5;
    const originX = anchorX + (random(i + 400) - .5) * root.w * .5;
    const endX = originX + Math.cos(spread) * length;
    const endY = anchorY + Math.sin(spread) * length + breathe;
    const midX = originX + Math.cos(spread + bend) * length * .52;
    const midY = anchorY + Math.sin(spread + bend) * length * .48;

    ctx.strokeStyle = `rgba(214,175,255,${.14 + random(i + 160) * .18})`;
    ctx.lineWidth = 1.3 + random(i + 200) * 1.1;
    ctx.beginPath();
    ctx.moveTo(originX, anchorY);
    ctx.quadraticCurveTo(midX, midY, endX, endY);
    ctx.stroke();

    // Ramificacao: a hifa se divide, e e isso que forma a trama do solo.

      const branchLength = length * (.3 + random(i + 320) * .28);

      ctx.beginPath();

        midX + Math.cos(branchAngle) * branchLength * .6,
        midY + Math.sin(branchAngle) * branchLength * .5,
        midX + Math.cos(branchAngle) * branchLength,

      ctx.beginPath();
      ctx.ellipse(endX, endY, 3.8, 2.7, spread, 0, TAU);
      ctx.fill();

function drawSpore(ctx, time, agent, profile) {
  const pulse = 1 + Math.sin(time * 2.4 + agent.phase) * .08;
  const r = (profile.kind === 'conidium' ? 6.5 : 5.5) * agent.size * pulse;
  ctx.save();
  ctx.translate(agent.x, agent.y);
  ctx.rotate(agent.angle + time * (profile.kind === 'conidium' ? .35 : -.22));
  const halo = ctx.createRadialGradient(0, 0, 0, 0, 0, r * 4);
  halo.addColorStop(0, `${profile.color}70`);
  halo.addColorStop(1, `${profile.color}00`);
  ctx.fillStyle = halo;
  ctx.beginPath();
  ctx.arc(0, 0, r * 4, 0, TAU);
  ctx.fill();
  ctx.fillStyle = profile.color;
  ctx.strokeStyle = 'rgba(255,255,255,.35)';
  ctx.lineWidth = 1;
  if (profile.kind === 'conidium') {
    // Conidio e unicelular e nao nada: nao tem flagelo. O que existe na base e
    // a cicatriz de desprendimento do conidioforo (hilo). A leitura interna vem
    // da parede espessa e das guticulas lipidicas, nao de um apendice.
    ctx.beginPath();
    ctx.ellipse(0, 0, r * 1.18, r * .86, 0, 0, TAU);
    ctx.fill();
    ctx.stroke();

    ctx.save();
    ctx.clip();
    ctx.strokeStyle = `${profile.pale || 'rgba(255,255,255,.5)'}`;
    ctx.globalAlpha = .5;
    ctx.lineWidth = 1.6;
    ctx.beginPath();
    ctx.ellipse(0, 0, r * 1.02, r * .7, 0, 0, TAU);
    ctx.stroke();
    ctx.globalAlpha = .38;
    ctx.fillStyle = 'rgba(255,255,255,.85)';
    ctx.beginPath();
    ctx.arc(r * .34, r * .16, Math.max(.9, r * .2), 0, TAU);
    ctx.arc(-r * .38, r * .26, Math.max(.7, r * .15), 0, TAU);
    ctx.fill();
    ctx.restore();

    ctx.strokeStyle = `${profile.color}cc`;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(-r * 1.12, -r * .2);
    ctx.lineTo(-r * 1.12, r * .2);
    ctx.stroke();
    ctx.lineWidth = 1;
  } else {
    ctx.beginPath();
    for (let i = 0; i < 12; i++) {
      const aa = i / 12 * TAU;
      const rr = i % 2 ? r : r * 1.34;
      const x = Math.cos(aa) * rr;
      const y = Math.sin(aa) * rr;
      i ? ctx.lineTo(x, y) : ctx.moveTo(x, y);
    }
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
  }
  ctx.fillStyle = 'rgba(255,255,255,.68)';
  ctx.beginPath();
  ctx.arc(-r * .22, -r * .2, Math.max(1, r * .18), 0, TAU);
  ctx.fill();
  ctx.restore();
}

function createMicrobeEcology({ state, entities }) {
  const ecology = {
    active: false,
    agents: [],
    encounters: [],
  };
  let trailTick = 0;

  function clear() {
    ecology.active = false;
    ecology.agents.length = 0;
    ecology.encounters.length = 0;
  }

  function spawnZone(zone) {
    const maxAgents = 156;
    const profile = MICROBE_MOTION_PROFILES[zone.id];
    if (!profile || ecology.agents.length >= maxAgents) return;
    // O fungo oportunista representa um foco radicular, não um enxame móvel.
    // A rede hifal dedicada cuida das ramificações e dos esporos desse foco.
    const requestedCount = zone.id === 'oportunista' ? 1 : profile.count;
    const count = Math.min(requestedCount, maxAgents - ecology.agents.length);
    const rnd = seededRandom(hashSeed(`${zone.id}:${Math.round(zone.x)}:${Math.round(zone.y)}:${zone.index}`));
    const homeY = clamp(zone.y - 32, 95, H - 100);

    for (let i = 0; i < count; i++) {
      const angle = rnd() * TAU;
      const radius = profile.radius * (.18 + rnd() * .62);
      const direction = rnd() * TAU;
      ecology.agents.push({
        id: `${zone.index}:${i}`,
        type: zone.id,
        zoneIndex: zone.index,
        homeX: zone.x,
        homeY,
        radius: zone.r || profile.radius,
        x: zone.x + Math.cos(angle) * radius,
        y: clamp(homeY + Math.sin(angle) * radius * .62, 70, H - 70),
        vx: Math.cos(direction) * profile.speed * (.45 + rnd() * .35),
        vy: Math.sin(direction) * profile.speed * (.35 + rnd() * .25),
        targetVX: 0,
        targetVY: 0,
        angle: direction,
        phase: rnd() * TAU,
        size: .78 + rnd() * .48,
        tumble: .3 + rnd() * 1.2,
        trail: [],
      });
    }
    ecology.active = ecology.agents.length > 0;
  }

  function addEncounter(encounter) {
    const zone = { ...encounter, index: ecology.encounters.length };
    ecology.encounters.push(zone);
    spawnZone(zone);
    return zone;
  }

  function reset(encounters) {
    clear();
    for (const encounter of encounters) addEncounter(encounter);
    ecology.active = ecology.agents.length > 0;
  }

  function obstacleForce(agent) {
    let fx = 0;
    let fy = 0;
    const margin = 58;
    const level = state.level;

    for (const rect of level.platforms) {
      if (agent.x < rect.x - margin || agent.x > rect.x + rect.w + margin || agent.y < rect.y - margin || agent.y > rect.y + rect.h + margin) continue;
      const point = nearestPointOnRect(agent.x, agent.y, rect);
      let dx = agent.x - point.x;
      let dy = agent.y - point.y;
      let d = Math.hypot(dx, dy);
      const inside = agent.x >= rect.x && agent.x <= rect.x + rect.w && agent.y >= rect.y && agent.y <= rect.y + rect.h;
      if (inside) {
        dx = 0;
        dy = -1;
        d = 1;
      }
      if (d < margin) {
        const f = (margin - d) / margin;
        fx += dx / Math.max(1, d) * f * 180;
        fy += dy / Math.max(1, d) * f * 180;
      }
    }

    for (const hazard of level.hazards) {
      if (agent.x < hazard.x - 70 || agent.x > hazard.x + hazard.w + 70 || agent.y < hazard.y - 85) continue;
      const point = nearestPointOnRect(agent.x, agent.y, hazard);
      const dx = agent.x - point.x;
      const dy = agent.y - point.y;
      const d = Math.max(1, Math.hypot(dx, dy));
      if (d < 85) {
        const f = (85 - d) / 85;
        fx += dx / d * f * 210;
        fy += dy / d * f * 240 - f * 90;
      }
    }
    return { x: fx, y: fy };
  }

  function update(dt) {
    if (!ecology.active || state.gameState !== 'play') return;
    trailTick -= dt;
    const addTrail = trailTick <= 0;
    if (addTrail) trailTick = .065;

    const playerX = state.player.x + state.player.w / 2;
    const playerY = state.player.y + state.player.h / 2;
    const cameraCenter = state.cameraX + W / 2;

    for (const zone of ecology.encounters) {
      if (!state.discoveredMicrobes.has(zone.id) && Math.hypot(zone.x - playerX, zone.y - playerY) < (zone.r || 135)) {
        entities.discoverMicrobe(zone.id, true);
      }
    }

    for (const agent of ecology.agents) {
      const profile = MICROBE_MOTION_PROFILES[agent.type];
      if (!profile) continue;
      if (agent.rootedFungus) {
        agent.x = agent.rootAnchorX;
        agent.y = agent.rootAnchorY;
        agent.homeX = agent.rootAnchorX;
        agent.homeY = agent.rootAnchorY;
        agent.vx = 0;
        agent.vy = 0;
        agent.targetVX = 0;
        agent.targetVY = 0;
        continue;
      }
      // Esporo de micorriza pertence ao micelio, nao o contrario: a casa dele e
      // o ponto de raiz onde o micelio esta, e ele so flutua em volta disso.
      // Antes o micelio e que seguia os esporos e deslizava pela raiz.
      const myceliumZone = agent.type === 'myco' && !agent.beneficialRecruitedUntil
        ? ecology.encounters[agent.zoneIndex]
        : null;
      if (myceliumZone) {
        const anchor = ensureMyceliumAnchor(state, myceliumZone);
        if (anchor) {
          const point = myceliumPoint(anchor);
          agent.homeX = point.x;
          agent.homeY = point.y - 34;
        }
      }

      const distanceFromCamera = Math.abs(agent.x - cameraCenter);
      if (distanceFromCamera > W * 1.35) continue;

      let fx = 0;
      let fy = 0;
      let centerX = 0;
      let centerY = 0;
      let alignX = 0;
      let alignY = 0;
      let neighbours = 0;

      for (const other of ecology.agents) {
        if (other === agent || other.zoneIndex !== agent.zoneIndex) continue;
        const dx = other.x - agent.x;
        const dy = other.y - agent.y;
        const d = Math.hypot(dx, dy);
        if (d > 0 && d < 52) {
          const strength = (52 - d) / 52;
          fx -= dx / d * strength * profile.speed * profile.separation;
          fy -= dy / d * strength * profile.speed * profile.separation;
        }
        if (d > 0 && d < 155) {
          centerX += other.x;
          centerY += other.y;
          alignX += other.vx;
          alignY += other.vy;
          neighbours++;
        }
      }

      if (neighbours) {
        centerX /= neighbours;
        centerY /= neighbours;
        alignX /= neighbours;
        alignY /= neighbours;
        fx += (centerX - agent.x) * profile.cohesion;
        fy += (centerY - agent.y) * profile.cohesion;
        fx += (alignX - agent.vx) * profile.alignment;
        fy += (alignY - agent.vy) * profile.alignment;
      }

      const zone = ecology.encounters[agent.zoneIndex];
      const orbitX = Math.cos(state.time * .23 + agent.phase) * profile.radius * .22;

    get vigorAverage() { return colonies.vigorAverage; },
    get tipCount() {

    reset,
